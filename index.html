<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Flash Gordon — Pre-Shot</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Share+Tech+Mono&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --gold: #FFD700; --gold-dim: #A87800;
    --cyan: #00F0FF; --cyan-dim: #007A80;
    --dark: #05080D; --dark2: #0B1018; --dark3: #131C28;
    --red: #FF3A3A; --text: #E0EEF5; --text-dim: #4A6878;
  }
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body { height:100%; background:var(--dark); color:var(--text); font-family:'Rajdhani',sans-serif; overflow:hidden; }
  body::after { content:''; position:fixed; inset:0; pointer-events:none; z-index:999; background:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(0,240,255,0.012) 3px,rgba(0,240,255,0.012) 4px); }

  .app { height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:24px 20px; position:relative; }

  .bpm-badge { position:absolute; top:20px; right:20px; font-family:'Share Tech Mono',monospace; font-size:10px; letter-spacing:3px; color:var(--text-dim); text-align:right; line-height:1.6; }
  .bpm-badge span { display:block; font-size:18px; letter-spacing:1px; color:var(--cyan-dim); }

  .title-block { text-align:center; margin-bottom:28px; }
  .title-sub { font-family:'Share Tech Mono',monospace; font-size:9px; letter-spacing:6px; color:var(--cyan-dim); margin-bottom:4px; }
  h1 { font-family:'Bebas Neue',sans-serif; font-size:clamp(48px,14vw,80px); letter-spacing:10px; line-height:1; background:linear-gradient(160deg,var(--gold) 0%,#FFF5AA 45%,var(--gold) 75%,var(--gold-dim) 100%); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; filter:drop-shadow(0 0 18px rgba(255,215,0,0.35)); }

  .phase-display { width:100%; max-width:420px; background:var(--dark2); border:1px solid var(--dark3); border-radius:6px; padding:20px 24px; margin-bottom:20px; min-height:120px; display:flex; flex-direction:column; justify-content:center; position:relative; overflow:hidden; transition:min-height 0.2s; }
  .phase-display::before { content:''; position:absolute; top:0; left:0; right:0; height:2px; background:linear-gradient(90deg,transparent,var(--bar-color,var(--cyan-dim)),transparent); }

  .phase-label { font-family:'Share Tech Mono',monospace; font-size:9px; letter-spacing:4px; color:var(--text-dim); margin-bottom:8px; text-transform:uppercase; }
  .phase-cue { font-family:'Bebas Neue',sans-serif; font-size:clamp(26px,7vw,36px); letter-spacing:3px; color:var(--text); line-height:1.1; transition:color 0.15s; }
  .phase-cue.gold { color:var(--gold); }
  .phase-cue.cyan { color:var(--cyan); }
  .phase-cue.red  { color:var(--red);  }
  .phase-detail { font-size:13px; letter-spacing:1px; color:var(--text-dim); margin-top:6px; font-weight:600; }
  .wisdom-sub { font-size:12px; letter-spacing:1px; color:var(--gold-dim); margin-top:8px; font-style:italic; line-height:1.4; display:none; }
  .wisdom-sub.on { display:block; }

  .beat-row { display:flex; gap:10px; margin-bottom:20px; }
  .beat-dot { width:12px; height:12px; border-radius:50%; background:var(--dark3); border:1px solid var(--dark3); transition:all 0.05s; }
  .beat-dot.on-gold { background:var(--gold); box-shadow:0 0 10px var(--gold),0 0 20px rgba(255,215,0,0.4); transform:scale(1.3); }
  .beat-dot.on-cyan { background:var(--cyan); box-shadow:0 0 10px var(--cyan),0 0 20px rgba(0,240,255,0.4); transform:scale(1.3); }
  .beat-dot.on-red  { background:var(--red);  box-shadow:0 0 10px var(--red); transform:scale(1.3); }
  .beat-dot.on-     { background:var(--text); box-shadow:0 0 8px rgba(224,238,245,0.4); transform:scale(1.3); }

  .progress-track { width:100%; max-width:420px; height:2px; background:var(--dark3); border-radius:1px; margin-bottom:24px; overflow:hidden; }
  .progress-fill  { height:100%; background:linear-gradient(90deg,var(--cyan-dim),var(--gold)); width:0%; transition:width 0.15s linear; }

  .play-btn {
    width:120px; height:120px; border-radius:50%;
    background: radial-gradient(circle at 38% 35%, #FFE84D, #FFD700 45%, #B8960C 100%);
    border: 4px solid #1a1400;
    box-shadow: 0 4px 0 #7a6000, 0 6px 24px rgba(255,215,0,0.35), inset 0 2px 4px rgba(255,255,200,0.4);
    cursor:pointer; display:flex; align-items:center; justify-content:center;
    position:relative; transition:transform 0.1s, box-shadow 0.1s; outline:none;
  }
  .play-btn:hover { transform:scale(1.04); box-shadow: 0 4px 0 #7a6000, 0 8px 32px rgba(255,215,0,0.5), inset 0 2px 4px rgba(255,255,200,0.4); }
  .play-btn:active { transform:scale(0.96) translateY(3px); box-shadow: 0 1px 0 #7a6000, 0 3px 12px rgba(255,215,0,0.3), inset 0 2px 4px rgba(255,255,200,0.2); }
  .play-btn.playing {
    background: radial-gradient(circle at 38% 35%, #1a1a1a, #111 45%, #050505 100%);
    border-color: #333;
    box-shadow: 0 4px 0 #000, 0 6px 24px rgba(255,58,58,0.3), inset 0 2px 4px rgba(255,255,255,0.05);
    animation: pulse 0.789s ease-in-out infinite;
  }
  @keyframes pulse { 0%{box-shadow:0 4px 0 #000, 0 0 0 0 rgba(255,58,58,0.4)} 70%{box-shadow:0 4px 0 #000, 0 0 0 18px rgba(255,58,58,0)} 100%{box-shadow:0 4px 0 #000, 0 0 0 0 rgba(255,58,58,0)} }
  .play-icon { font-size:48px; color:#1a1400; margin-left:6px; line-height:1; filter:drop-shadow(0 1px 0 rgba(255,255,150,0.5)); }
  .stop-icon { width:28px; height:28px; background:var(--red); border-radius:4px; display:none; box-shadow:0 0 10px rgba(255,58,58,0.6); }
  .play-btn.playing .play-icon { display:none; }
  .play-btn.playing .stop-icon { display:block; }

  .btn-label  { margin-top:10px; font-family:'Share Tech Mono',monospace; font-size:10px; letter-spacing:4px; color:var(--text-dim); }
  .idle-hint  { font-family:'Share Tech Mono',monospace; font-size:10px; letter-spacing:3px; color:var(--text-dim); margin-top:14px; opacity:0.6; }
  .done-flash { position:fixed; inset:0; background:rgba(255,215,0,0.06); pointer-events:none; opacity:0; transition:opacity 0.1s; z-index:50; }
  .done-flash.show { opacity:1; }
</style>
</head>
<body>
<div class="app">
  <div class="bpm-badge"><span>76</span>BPM · 4/4</div>
  <div class="title-block">
    <div class="title-sub">Pre-Shot Routine</div>
    <h1>FLASH GORDON</h1>
  </div>
  <div class="phase-display" id="phaseDisplay">
    <div class="phase-label"  id="phaseLabel">READY</div>
    <div class="phase-cue"    id="phaseCue">Hit play before your shot</div>
    <div class="phase-detail" id="phaseDetail"></div>
    <div class="wisdom-sub"   id="wisdomSub"></div>
  </div>
  <div class="beat-row">
    <div class="beat-dot" id="d0"></div>
    <div class="beat-dot" id="d1"></div>
    <div class="beat-dot" id="d2"></div>
    <div class="beat-dot" id="d3"></div>
  </div>
  <div class="progress-track"><div class="progress-fill" id="progressFill"></div></div>
  <button class="play-btn" id="playBtn" onclick="togglePlay()">
    <span class="play-icon">&#9654;</span>
    <span class="stop-icon"></span>
  </button>
  <div class="btn-label" id="btnLabel">PLAY</div>
  <div class="idle-hint" id="idleHint">tap before each shot</div>
</div>
<div class="done-flash" id="doneFlash"></div>

<script>
// ═══════════════════════════════════════════════════════════
// TEMPO — exact, never rounded
// ═══════════════════════════════════════════════════════════
const BPM     = 76;
const BEAT_MS = 60000 / BPM;   // 789.4736842... ms

// ═══════════════════════════════════════════════════════════
// WISDOM LIBRARY
// ═══════════════════════════════════════════════════════════
const WISDOM = [
  { cat:'MECHANICS', short:'Still Elbow',        sub:'upper arm locked — only forearm moves',       speak:'Still elbow. Only the forearm moves.' },
  { cat:'MECHANICS', short:'Grip Like a Bird',   sub:'gentle but secure — firm enough not to drop', speak:'Hold the cue like a bird. Gentle but secure.' },
  { cat:'MECHANICS', short:'Cue Room',           sub:'full extension behind — no short backswing',  speak:'Make sure you have plenty of room for the cue.' },
  { cat:'MECHANICS', short:'Level Cue',          sub:'shaft parallel to the cloth',                 speak:'Keep the cue level.' },
  { cat:'MECHANICS', short:'Bridge Length',      sub:'8 to 10 inches — same every shot',            speak:'Check your bridge length. Eight to ten inches.' },
  { cat:'MECHANICS', short:'Head Down',          sub:'chin close to cue — stay down through shot',  speak:'Head down. Chin close to the cue.' },
  { cat:'MECHANICS', short:'Follow Through',     sub:'drive through the cue ball, not to it',       speak:'Follow through. Drive past the cue ball.' },
  { cat:'MECHANICS', short:'Back Foot Weight',   sub:'60% weight back — stable base',               speak:'Weight on your back foot. Stay grounded.' },
  { cat:'MINDSET',   short:'One Shot at a Time', sub:'this shot only — clear everything else',      speak:'One shot at a time. Nothing else exists.' },
  { cat:'MINDSET',   short:'Commit Fully',       sub:'decide, then execute — no second guessing',   speak:'Commit fully. The decision is made.' },
  { cat:'MINDSET',   short:'Trust the Routine',  sub:'you have trained this — let it happen',       speak:'Trust the routine. You have trained this.' },
  { cat:'MINDSET',   short:'Breathe Out',        sub:'exhale fully before the final stroke',        speak:'Breathe out before you shoot.' },
  { cat:'MINDSET',   short:'See the Line',       sub:'visualize the full path before stepping in',  speak:'See the full line before you step in.' },
  { cat:'MINDSET',   short:'Slow is Smooth',     sub:'smooth tempo beats forced power every time',  speak:'Slow is smooth. Smooth is accurate.' },
  { cat:'MINDSET',   short:'Play the Shot',      sub:'not the outcome — execute, then release',     speak:'Play the shot, not the result.' },
  { cat:'POSITION',  short:'Plan Your Leave',    sub:'know where cue ball ends up before you shoot',speak:'Plan your leave. Where is the cue ball going?' },
  { cat:'POSITION',  short:'Speed Control',      sub:'pace beats spin — soft touch wins games',     speak:'Speed control. Soft touch wins games.' },
  { cat:'POSITION',  short:'Natural Angle',      sub:'use the angle the table gives you',           speak:'Use the natural angle. Work with the table.' },

  // ── MECHANICS — advanced ──────────────────────────────────────────────────────
  { cat:'MECHANICS', short:'Dominant Eye',        sub:'align your dominant eye over the shot line',   speak:'Dominant eye over the line. Sight it the same way every time.' },
  { cat:'MECHANICS', short:'Straight Back Swing', sub:'back swing must be as straight as the forward', speak:'Straight back swing. It matters as much as the forward stroke.' },
  { cat:'MECHANICS', short:'Grip Hand Relaxed',   sub:'cradle the cue — tension kills the stroke',    speak:'Relax the grip hand. Cradle it, do not squeeze it.' },
  { cat:'MECHANICS', short:'Tip on Center',       sub:'find center ball before adding spin',           speak:'Strike center ball first. Master that before adding spin.' },
  { cat:'MECHANICS', short:'Chin on Cue',         sub:'lower your chin toward the cue for alignment', speak:'Get your chin down toward the cue. See the line clearly.' },
  { cat:'MECHANICS', short:'Pause at Address',    sub:'be completely still before the final stroke',   speak:'Be completely still at address before you pull the trigger.' },
  { cat:'MECHANICS', short:'Chalk Every Shot',    sub:'chalk is your trigger — it starts the routine', speak:'Chalk up. It tells your brain the routine has begun.' },
  { cat:'MECHANICS', short:'Vision Center',       sub:'position your head so your vision center aligns', speak:'Position your vision center directly over the shot line.' },
  { cat:'MECHANICS', short:'No Steering',         sub:'once committed, let the stroke go — no guiding', speak:'Do not steer the cue. Commit and let it go.' },
  { cat:'MECHANICS', short:'Feet Outside Shoulder', sub:'feet just outside shoulder width — stable base', speak:'Feet just outside shoulder width. Build a stable base.' },

  // ── MINDSET — advanced ────────────────────────────────────────────────────────
  { cat:'MINDSET',   short:'Respect Every Shot',  sub:'there is no such thing as an easy shot',       speak:'Respect every shot. There is no such thing as an easy one.' },
  { cat:'MINDSET',   short:'Process Over Outcome', sub:'focus on execution, not the result',           speak:'Focus on the process. The outcome takes care of itself.' },
  { cat:'MINDSET',   short:'Reset After a Miss',  sub:'shortest emotional recovery wins matches',      speak:'Reset immediately after a miss. Zero carryover.' },
  { cat:'MINDSET',   short:'No Indecision',       sub:'most shots are missed because of indecision',  speak:'Decide standing up. No second guessing once you are down.' },
  { cat:'MINDSET',   short:'Get Up and Reset',    sub:'if something feels wrong, stand up and restart', speak:'If it does not feel right, get up and start over.' },
  { cat:'MINDSET',   short:'Embrace Pressure',    sub:'pressure is a privilege — you earned this shot', speak:'Embrace the pressure. You earned this shot.' },
  { cat:'MINDSET',   short:'Play Your Game',      sub:'do the highest percentage shot YOU know how to make', speak:'Play within your abilities. Do what you know how to do.' },
  { cat:'MINDSET',   short:'Deep Breath',         sub:'one deep exhale resets the nervous system',    speak:'Take one deep breath. Exhale fully. Reset the body.' },
  { cat:'MINDSET',   short:'Still Eyes',          sub:'clear mind, still eyes — then execute',        speak:'Clear mind. Still eyes. Then execute.' },
  { cat:'MINDSET',   short:'Visualize First',     sub:'see the entire shot in your mind before stepping in', speak:'See the full shot before you move. Ball path, contact, leave.' },
  { cat:'MINDSET',   short:'No Lazy Shots',       sub:'apply the same focus to easy shots as hard ones', speak:'No lazy shots. Give every ball the same respect.' },
  { cat:'MINDSET',   short:'You Are the Opponent', sub:'your real competition is yourself at the table', speak:'Forget your opponent. Your only competition is yourself.' },

  // ── POSITION — advanced ───────────────────────────────────────────────────────
  { cat:'POSITION',  short:'Cue Ball Path',       sub:'know where the cue ball travels after contact', speak:'Know the cue ball path before you shoot. See it travel.' },
  { cat:'POSITION',  short:'Think Three Ahead',   sub:'plan three shots ahead minimum',               speak:'Think three shots ahead. Know your route before you start.' },
  { cat:'POSITION',  short:'Avoid the Rail',      sub:'keep the cue ball off the rail when possible', speak:'Keep the cue ball off the rail. Open positions win games.' },
  { cat:'POSITION',  short:'Speed Over Spin',     sub:'pace controls position better than english',   speak:'Speed controls position better than spin. Learn the pace.' },
  { cat:'POSITION',  short:'Ghost Ball',          sub:'visualize the ghost ball at the contact point', speak:'Visualize the ghost ball at the contact point. Aim for its center.' },
  { cat:'POSITION',  short:'90 Degree Rule',      sub:'stun shots — cue ball separates at 90 degrees', speak:'Remember the ninety degree rule. Stun shots split at ninety.' },
  { cat:'POSITION',  short:'Clear the Path',      sub:'pocket balls that open routes for the others', speak:'Clear the path first. Pocket balls that open your route.' },
  { cat:'POSITION',  short:'Cluster Strategy',    sub:'identify trouble clusters early and plan around them', speak:'Find the trouble clusters early. Have a plan before you run.' },
  { cat:'POSITION',  short:'Soft Touch Wins',     sub:'finesse beats power on position play',         speak:'Soft touch wins games. You can not finesse a ball you overhit.' },
  { cat:'POSITION',  short:'Center Ball First',   sub:'master center ball control before using spin', speak:'Master center ball. It is the foundation of cue ball control.' },

  // ── SLIP STROKE ───────────────────────────────────────────────────────────────
  { cat:'SLIP STROKE', short:'Feather Grip',        sub:'near-zero pressure during the slip — let it go',  speak:'Feather grip on the slip. Let the cue go. Trust it.' },
  { cat:'SLIP STROKE', short:'Match the Warm-Ups',  sub:'final stroke must feel identical to practice strokes', speak:'Make the throw feel exactly like your warm-up strokes. No difference.' },
  { cat:'SLIP STROKE', short:'Stay Down Through It', sub:'do not rise on the throw — stay down until the pocket', speak:'Stay down through the throw. Do not come up early.' },
  { cat:'SLIP STROKE', short:'Release Then Catch',  sub:'release flows into the catch — one smooth motion', speak:'Release and catch. One smooth motion, no jab.' },
  { cat:'SLIP STROKE', short:'Grip After Contact',  sub:'regrip naturally completes after the cue ball is struck', speak:'Let the grip come back naturally after contact. Do not force it.' },
  { cat:'SLIP STROKE', short:'Straight Slip Back',  sub:'the slip back must be straight — any angle kills the line', speak:'Slip straight back. Any angle off line will kill the shot.' },
  { cat:'SLIP STROKE', short:'Wrist Loose',         sub:'loose wrist allows the slip to flow through freely', speak:'Keep the wrist loose. A tight wrist blocks the slip.' },
  { cat:'SLIP STROKE', short:'Same Range of Motion', sub:'slip keeps your arm in the same range as warm-ups', speak:'The slip keeps your arm in the same range of motion as every practice stroke.' },
  { cat:'SLIP STROKE', short:'No Grip Change',      sub:'grip position on the cue should not jump at release', speak:'No grip jump on the release. Let it slide, not lurch.' },
  { cat:'SLIP STROKE', short:'Cue Lengthens',       sub:'the slip effectively extends your reach on the final stroke', speak:'Feel the cue lengthen through the shot. That is the slip working.' },
];
// Shuffled deck — every cue plays once before any repeats
let wisdomDeck = [];
function getShuffledWisdom() {
  if (wisdomDeck.length === 0) {
    // Refill and shuffle using Fisher-Yates
    wisdomDeck = WISDOM.map((_, i) => i);
    for (let i = wisdomDeck.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [wisdomDeck[i], wisdomDeck[j]] = [wisdomDeck[j], wisdomDeck[i]];
    }
  }
  return WISDOM[wisdomDeck.pop()];
}

// ═══════════════════════════════════════════════════════════
// SEQUENCE
// ms    = exact duration of this step in milliseconds
// click = 'hi'|'mid'|'soft'|'slow'|'shoot'|null
// speak = string | null
// color = 'gold'|'cyan'|'red'|''
// isWisdom = true shows the sub-detail line
// ═══════════════════════════════════════════════════════════
function buildSequence() {
  const B  = BEAT_MS;
  const B2 = BEAT_MS * 2;
  const w  = getShuffledWisdom();

  return [
    // 0  PRE-SHOT WISDOM  (4 beats)
    { ms:B*4, phase:'PRE-SHOT', label:w.cat,         cue:w.short,         detail:w.sub,                              color:'gold', click:null,    speak:w.speak,                      isWisdom:true  },
    // 1  EYE: CB
    { ms:B,   phase:'PHASE 0',  label:'EYE SEQUENCE', cue:'Cue Ball',      detail:'look 1 · establish position',      color:'cyan', click:'soft',  speak:'Cue ball',                   isWisdom:false },
    // 2  EYE: OB
    { ms:B,   phase:'PHASE 0',  label:'EYE SEQUENCE', cue:'Object Ball',   detail:'look 2 · find your target',        color:'gold', click:'soft',  speak:'Object ball',                isWisdom:false },
    // 3  EYE: CB
    { ms:B,   phase:'PHASE 0',  label:'EYE SEQUENCE', cue:'Cue Ball',      detail:'look 3 · confirm contact point',   color:'cyan', click:'soft',  speak:'Cue ball',                   isWisdom:false },
    // 4  EYE: OB — lock & step
    { ms:B,   phase:'PHASE 0',  label:'EYE SEQUENCE', cue:'Object Ball',   detail:'look 4 · lock the line · step in', color:'gold', click:'soft',  speak:'Object ball.',      isWisdom:false },
    // 5  RIGHT FOOT
    { ms:B,   phase:'PHASE 1',  label:'APPROACH',     cue:'Right Foot',    detail:'plant lead foot · eyes OB',        color:'gold', click:'hi',    speak:'Right foot',                 isWisdom:false },
    // 6  LEFT FOOT
    { ms:B,   phase:'PHASE 1',  label:'APPROACH',     cue:'Left Foot',     detail:'set stance width',                 color:'',     click:'mid',   speak:'Left foot',                  isWisdom:false },
    // 7  BRIDGE DOWN
    { ms:B,   phase:'PHASE 1',  label:'APPROACH',     cue:'Bridge Down',   detail:'lower into address · eyes CB',     color:'cyan', click:'mid',   speak:'Bridge down',                isWisdom:false },
    // 8  ADDRESS PAUSE
    { ms:B,   phase:'PHASE 1',  label:'PAUSE',        cue:'Pause',         detail:'full stillness · breathe out',     color:'red',  click:'soft',  speak:'Pause. Settle.',             isWisdom:false },
    // 9  WU1 BACK
    { ms:B,   phase:'PHASE 2',  label:'WARM-UP 1',    cue:'Back',  detail:'normal pace · drift to stop · OB', color:'red',  click:'mid',   speak:'Back',                       isWisdom:false },
    // 10 WU1 FORWARD
    { ms:B,   phase:'PHASE 2',  label:'WARM-UP 1',    cue:'Forward',       detail:'normal pace · eyes CB',            color:'cyan', click:'hi',    speak:'Forward',                    isWisdom:false },
    // 11 WU2 BACK+LOCK OB
    { ms:B,   phase:'PHASE 2',  label:'WARM-UP 2',    cue:'Back',   detail:'drift to stop · eyes lock OB',     color:'gold', click:'mid',   speak:'Back', isWisdom:false },
    // 12 WU2 FORWARD
    { ms:B,   phase:'PHASE 2',  label:'WARM-UP 2',    cue:'Forward',       detail:'normal pace · eyes CB',            color:'cyan', click:'hi',    speak:'Forward',                    isWisdom:false },
    // 13 FINAL PAUSE (replaces forward — settle before slow back)
    { ms:B,   phase:'PHASE 2',  label:'FINAL STROKE', cue:'Pause',         detail:'stillness · eyes CB · load',       color:'red',  click:'soft',  speak:'Pause',                      isWisdom:false },
    // 14 FINAL SLOW BACK (2 beats)
    { ms:B2,  phase:'PHASE 2',  label:'SLOW BACK ½x', cue:'Slow... Back',  detail:'half speed · 2 beats · load it',   color:'gold', click:'slow',  speak:'Slow back.',                 isWisdom:false },
    // 15 LOAD PAUSE — completes the 4-beat measure before shoot
    { ms:B,   phase:'PHASE 2',  label:'LOAD',         cue:'Set',           detail:'apex · eyes locked OB · ready',    color:'red',  click:'soft',  speak:null,                         isWisdom:false },
    // 15 SHOOT
    { ms:B,   phase:'PHASE 3',  label:'EXECUTE',      cue:'THROW',         detail:'slip through · eyes on OB',        color:'gold', click:'shoot', speak:'Throw',                      isWisdom:false },
    // 16 HOLD
    { ms:B,   phase:'PHASE 3',  label:'HOLD',         cue:'Hold Position', detail:'stay down · do not lift',          color:'cyan', click:'soft',  speak:'Hold your position.',        isWisdom:false },
    // 17 FREEZE 1
    { ms:B,   phase:'PHASE 3',  label:'FREEZE',       cue:'Stay Down',     detail:'ball is still travelling',         color:'red',  click:'soft',  speak:null,                         isWisdom:false },
    // 18 FREEZE 2
    { ms:B,   phase:'PHASE 3',  label:'FREEZE',       cue:'Stay Down',     detail:'wait for the pocket',              color:'red',  click:'soft',  speak:null,                         isWisdom:false },
  ];
}

// ═══════════════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════════════
let audioCtx = null;
let running  = false;
let runId    = 0;    // bumped each play/stop — orphans all pending callbacks

// ═══════════════════════════════════════════════════════════
// AUDIO
// ═══════════════════════════════════════════════════════════
function initAudio() {
  if (!audioCtx || audioCtx.state === 'closed') {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  }
  if (audioCtx.state === 'suspended') audioCtx.resume();
}

function playClick(type, when) {
  if (!audioCtx) return;
  const map = {
    hi:    [[1200, 0.7,  0.04]],
    mid:   [[800,  0.45, 0.035]],
    soft:  [[500,  0.28, 0.03]],
    slow:  [[560,  0.40, 0.06]],
    shoot: [[150,  0.95, 0.09], [1500, 0.7, 0.045]],
  };
  (map[type] || []).forEach(([freq, amp, dur]) => {
    const osc = audioCtx.createOscillator();
    const env = audioCtx.createGain();
    osc.connect(env);
    env.connect(audioCtx.destination);
    osc.frequency.value = freq;
    env.gain.setValueAtTime(0, when);
    env.gain.linearRampToValueAtTime(amp, when + 0.008);
    env.gain.exponentialRampToValueAtTime(0.001, when + dur);
    osc.start(when);
    osc.stop(when + dur + 0.02);
  });
}

// ═══════════════════════════════════════════════════════════
// SPEECH
// ═══════════════════════════════════════════════════════════
function getBestVoice() {
  const vs = window.speechSynthesis.getVoices();
  if (!vs.length) return null;
  return vs.find(v => v.name === 'Daniel')
      || vs.find(v => v.name === 'Alex')
      || vs.find(v => v.name === 'Samantha')
      || vs.find(v => v.name.includes('Google US English'))
      || vs.find(v => v.lang === 'en-US')
      || vs.find(v => v.lang && v.lang.startsWith('en'))
      || vs[0];
}

function sayAt(text, wallClockMs, myRunId) {
  // Fires at absolute wall-clock time — completely independent of audio scheduling
  const delay = wallClockMs - performance.now();
  setTimeout(() => {
    if (!running || runId !== myRunId) return;
    const u = new SpeechSynthesisUtterance(text);
    u.rate   = 0.84;
    u.pitch  = 0.95;
    u.volume = 1.0;
    const v = getBestVoice();
    if (v) u.voice = v;
    window.speechSynthesis.speak(u);
  }, Math.max(0, delay));
}

// ═══════════════════════════════════════════════════════════
// UI
// ═══════════════════════════════════════════════════════════
function renderStep(s, idx, total) {
  document.getElementById('phaseLabel').textContent  = s.phase + ' · ' + s.label;
  document.getElementById('phaseCue').textContent    = s.cue;
  document.getElementById('phaseCue').className      = 'phase-cue ' + (s.color || '');
  document.getElementById('phaseDetail').textContent = s.detail;

  const wsub = document.getElementById('wisdomSub');
  if (s.isWisdom) {
    wsub.textContent = s.sub || s.detail;
    wsub.classList.add('on');
    document.getElementById('phaseDisplay').style.minHeight = '145px';
  } else {
    wsub.classList.remove('on');
    document.getElementById('phaseDisplay').style.minHeight = '120px';
  }

  // Beat indicator — position within a 4-beat measure
  const beatPos = idx % 4;
  for (let i = 0; i < 4; i++) {
    document.getElementById('d' + i).className =
      'beat-dot' + (i === beatPos ? ' on-' + (s.color || '') : '');
  }

  document.getElementById('progressFill').style.width =
    Math.round((idx + 1) / total * 100) + '%';
}

function renderReady() {
  document.getElementById('phaseLabel').textContent  = 'READY';
  document.getElementById('phaseCue').textContent    = 'Hit play before your shot';
  document.getElementById('phaseCue').className      = 'phase-cue';
  document.getElementById('phaseDetail').textContent = '';
  document.getElementById('wisdomSub').classList.remove('on');
  document.getElementById('phaseDisplay').style.minHeight = '120px';
  document.getElementById('progressFill').style.width = '0%';
  for (let i = 0; i < 4; i++) document.getElementById('d' + i).className = 'beat-dot';
}

function renderComplete() {
  document.getElementById('phaseLabel').textContent  = 'COMPLETE';
  document.getElementById('phaseCue').textContent    = 'Step up. Execute.';
  document.getElementById('phaseCue').className      = 'phase-cue gold';
  document.getElementById('phaseDetail').textContent = '';
  document.getElementById('progressFill').style.width = '100%';
  const fl = document.getElementById('doneFlash');
  fl.classList.add('show');
  setTimeout(() => fl.classList.remove('show'), 350);
}

function setButtons(playing) {
  document.getElementById('playBtn').classList.toggle('playing', playing);
  document.getElementById('btnLabel').textContent    = playing ? 'STOP' : 'PLAY';
  document.getElementById('idleHint').style.display  = playing ? 'none' : 'block';
}

// ═══════════════════════════════════════════════════════════
// ENGINE
// Chain of setTimeout calls — each step schedules the next.
// runId guards against orphaned callbacks after stop().
// ═══════════════════════════════════════════════════════════
function runStep(seq, idx, myRunId) {
  if (!running || runId !== myRunId) return;  // orphan guard

  const s     = seq[idx];
  const total = seq.length;
  const now   = performance.now();

  // 1. Render UI
  renderStep(s, idx, total);

  // 2. Audio click — schedule slightly ahead in audio time
  if (s.click && audioCtx) {
    playClick(s.click, audioCtx.currentTime + 0.015);
  }

  // 3. Speech — spoken text fires at wall-clock offsets:
  //    SHOOT  → 150ms (after the punchy click sound settles)
  //    HOLD   → 500ms (gives SHOOT speech time to finish — SHOOT takes ~400ms to say)
  //    others → 100ms
  if (s.speak) {
    const offset = (s.label === 'HOLD') ? 450 : 0;
    sayAt(s.speak, now + offset, myRunId);
  }

  // 4. Schedule next step after this step's duration
  const nextIdx = idx + 1;
  if (nextIdx < total) {
    setTimeout(() => runStep(seq, nextIdx, myRunId), s.ms);
  } else {
    // Last step — wait its full duration then finish
    setTimeout(() => {
      if (!running || runId !== myRunId) return;
      finish();
    }, s.ms);
  }
}

function start() {
  initAudio();
  window.speechSynthesis.cancel();
  running = true;
  runId++;
  const myRunId = runId;
  const seq     = buildSequence();

  setButtons(true);

  // Small startup gap so AudioContext is fully live
  setTimeout(() => {
    if (!running || runId !== myRunId) return;
    runStep(seq, 0, myRunId);
  }, 100);
}

function finish() {
  running = false;
  setButtons(false);
  renderComplete();
}

function stop() {
  running = false;
  runId++;                          // orphans ALL pending timeouts instantly
  window.speechSynthesis.cancel();
  setButtons(false);
  renderReady();
}

function togglePlay() {
  if (running) stop(); else start();
}

// ═══════════════════════════════════════════════════════════
// VOICE PRELOAD
// ═══════════════════════════════════════════════════════════
window.speechSynthesis.getVoices();
window.speechSynthesis.onvoiceschanged = () => window.speechSynthesis.getVoices();
document.getElementById('playBtn').addEventListener('click', () => {
  if (window.speechSynthesis.paused) window.speechSynthesis.resume();
});
</script>
