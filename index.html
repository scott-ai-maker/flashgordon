<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Flash Gordon — Pre-Shot</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&family=Exo+2:ital,wght@0,300;0,400;0,600;0,700;1,300&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
  :root {
    --gold: #f5c400; --gold-dim: #a87e00;
    --cyan: #00bfff; --cyan-dim: #005f80;
    --dark: #080f18; --dark2: #0d1b2a; --dark3: #1a2d42;
    --red: #ff4444; --text: #e8e8e8; --text-dim: #9ab0c8;
  }
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body { height:100%; background:var(--dark); color:var(--text); font-family:’Exo 2’,sans-serif; overflow:hidden; }

  /* Grid overlay — matches flashgordonpool.com */
  body::before { content:’’; position:fixed; inset:0; pointer-events:none; z-index:0;
    background-image:linear-gradient(rgba(0,191,255,.04) 1px,transparent 0),linear-gradient(90deg,rgba(0,191,255,.04) 1px,transparent 0);
    background-size:60px 60px; }
  /* Ambient radial glows */
  body::after { content:’’; position:fixed; inset:0; pointer-events:none; z-index:0;
    background:
      radial-gradient(ellipse at 50% 0%,rgba(0,191,255,0.07) 0%,transparent 55%),
      radial-gradient(ellipse at 85% 100%,rgba(245,196,0,0.06) 0%,transparent 45%); }

.app { height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:24px 20px; position:relative; z-index:1; }

.bpm-badge { position:absolute; top:20px; right:20px; font-family:’Share Tech Mono’,monospace; font-size:10px; letter-spacing:3px; color:var(--text-dim); text-align:right; line-height:1.6; }
.bpm-badge span { display:block; font-size:18px; letter-spacing:1px; color:var(--cyan); }

.title-block { text-align:center; margin-bottom:28px; }
.title-sub { font-family:’Share Tech Mono’,monospace; font-size:9px; letter-spacing:6px; color:var(--cyan); margin-bottom:6px; opacity:0.7; }
h1 { font-family:’Orbitron’,sans-serif; font-weight:900; font-size:clamp(32px,10vw,62px); letter-spacing:6px; line-height:1;
  background:linear-gradient(160deg,var(--gold) 0%,#fff8c0 45%,var(--gold) 75%,var(--gold-dim) 100%);
  -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
  filter:drop-shadow(0 0 20px rgba(245,196,0,0.5)) drop-shadow(0 0 40px rgba(245,196,0,0.25)); }

.phase-display { width:100%; max-width:420px; background:rgba(13,27,42,0.85); border:1px solid rgba(0,191,255,0.2); border-radius:6px; padding:20px 24px; margin-bottom:20px; min-height:120px; display:flex; flex-direction:column; justify-content:center; position:relative; overflow:hidden; transition:min-height 0.2s;
  box-shadow:0 0 20px rgba(0,191,255,.08), inset 0 0 40px rgba(0,191,255,.02); }
.phase-display::before { content:’’; position:absolute; top:0; left:0; right:0; height:2px; background:linear-gradient(90deg,transparent,var(--bar-color,var(--cyan)),transparent); opacity:0.6; }

.phase-label { font-family:’Share Tech Mono’,monospace; font-size:9px; letter-spacing:4px; color:var(--text-dim); margin-bottom:8px; text-transform:uppercase; }
.phase-cue { font-family:’Orbitron’,sans-serif; font-weight:700; font-size:clamp(18px,5vw,28px); letter-spacing:2px; color:var(--text); line-height:1.2; transition:color 0.15s; }
.phase-cue.gold { color:var(--gold); text-shadow:0 0 20px rgba(245,196,0,.6),0 0 40px rgba(245,196,0,.3); }
.phase-cue.cyan { color:var(--cyan); text-shadow:0 0 20px rgba(0,191,255,.6),0 0 40px rgba(0,191,255,.3); }
.phase-cue.red  { color:var(--red);  text-shadow:0 0 20px rgba(255,68,68,.6); }
.phase-detail { font-family:’Exo 2’,sans-serif; font-size:12px; letter-spacing:0.5px; color:var(--text-dim); margin-top:6px; font-weight:400; }
.wisdom-sub { font-family:’Exo 2’,sans-serif; font-size:12px; letter-spacing:0.5px; color:rgba(245,196,0,0.75); margin-top:8px; font-style:italic; line-height:1.5; display:none; }
.wisdom-sub.on { display:block; }

.beat-row { display:flex; gap:10px; margin-bottom:20px; }
.beat-dot { width:12px; height:12px; border-radius:50%; background:var(--dark3); border:1px solid rgba(0,191,255,0.15); transition:all 0.05s; }
.beat-dot.on-gold { background:var(--gold); box-shadow:0 0 20px rgba(245,196,0,.4),0 0 40px rgba(245,196,0,.2); transform:scale(1.3); }
.beat-dot.on-cyan { background:var(--cyan); box-shadow:0 0 20px rgba(0,191,255,.4),0 0 40px rgba(0,191,255,.2); transform:scale(1.3); }
.beat-dot.on-red  { background:var(--red);  box-shadow:0 0 20px rgba(255,68,68,.4); transform:scale(1.3); }
.beat-dot.on-     { background:var(--text); box-shadow:0 0 8px rgba(232,232,232,0.4); transform:scale(1.3); }

.progress-track { width:100%; max-width:420px; height:2px; background:rgba(0,191,255,0.1); border-radius:1px; margin-bottom:24px; overflow:hidden; }
.progress-fill  { height:100%; background:linear-gradient(90deg,var(--cyan),var(--gold)); width:0%; transition:width 0.15s linear; }

.play-btn {
width:120px; height:120px; border-radius:50%;
background: radial-gradient(circle at 38% 35%, #ffe84d, #f5c400 45%, #a87e00 100%);
border: 3px solid rgba(245,196,0,0.4);
box-shadow: 0 4px 0 rgba(90,65,0,0.8), 0 6px 30px rgba(245,196,0,0.35), 0 0 20px rgba(245,196,0,.4),0 0 40px rgba(245,196,0,.2), inset 0 2px 4px rgba(255,255,200,0.4);
cursor:pointer; display:flex; align-items:center; justify-content:center;
position:relative; transition:transform 0.1s, box-shadow 0.1s; outline:none;
}
.play-btn:hover { transform:scale(1.04); box-shadow: 0 4px 0 rgba(90,65,0,0.8), 0 8px 40px rgba(245,196,0,0.5), 0 0 40px rgba(245,196,0,.5),0 0 60px rgba(245,196,0,.25), inset 0 2px 4px rgba(255,255,200,0.4); }
.play-btn:active { transform:scale(0.96) translateY(3px); box-shadow: 0 1px 0 rgba(90,65,0,0.8), 0 3px 12px rgba(245,196,0,0.3), inset 0 2px 4px rgba(255,255,200,0.2); }
.play-btn.playing {
background: radial-gradient(circle at 38% 35%, #1a2a3a, #0d1b2a 45%, #080f18 100%);
border: 3px solid rgba(0,191,255,0.3);
box-shadow: 0 4px 0 #000, 0 0 20px rgba(0,191,255,.4),0 0 40px rgba(0,191,255,.2), inset 0 2px 4px rgba(255,255,255,0.05);
animation: pulse 0.789s ease-in-out infinite;
}
@keyframes pulse { 0%{box-shadow:0 4px 0 #000,0 0 20px rgba(0,191,255,.4),0 0 0 0 rgba(0,191,255,0.5)} 70%{box-shadow:0 4px 0 #000,0 0 20px rgba(0,191,255,.4),0 0 0 20px rgba(0,191,255,0)} 100%{box-shadow:0 4px 0 #000,0 0 20px rgba(0,191,255,.4),0 0 0 0 rgba(0,191,255,0)} }
.play-icon { font-size:48px; color:#1a1000; margin-left:6px; line-height:1; filter:drop-shadow(0 1px 0 rgba(255,255,150,0.5)); }
.stop-icon { width:28px; height:28px; background:var(--cyan); border-radius:3px; display:none; box-shadow:0 0 20px rgba(0,191,255,.4),0 0 40px rgba(0,191,255,.2); }
.play-btn.playing .play-icon { display:none; }
.play-btn.playing .stop-icon { display:block; }

.btn-label  { margin-top:10px; font-family:’Share Tech Mono’,monospace; font-size:10px; letter-spacing:4px; color:var(--text-dim); }
.idle-hint  { font-family:’Share Tech Mono’,monospace; font-size:10px; letter-spacing:3px; color:var(--text-dim); margin-top:14px; opacity:0.5; }
.done-flash { position:fixed; inset:0; background:rgba(245,196,0,0.05); pointer-events:none; opacity:0; transition:opacity 0.1s; z-index:50; }
.done-flash.show { opacity:1; }

.bpm-control { display:flex; align-items:center; margin-top:16px; }
.bpm-adj { font-family:’Share Tech Mono’,monospace; font-size:16px; color:var(--cyan); background:transparent; border:1px solid rgba(0,191,255,0.3); width:30px; height:30px; cursor:pointer; transition:all 0.2s; outline:none; display:flex; align-items:center; justify-content:center; line-height:1; }
.bpm-adj:first-child { border-radius:15px 0 0 15px; }
.bpm-adj:last-child  { border-radius:0 15px 15px 0; }
.bpm-adj:hover:not(:disabled) { color:var(--gold); border-color:rgba(245,196,0,0.5); background:rgba(245,196,0,0.05); }
.bpm-adj:disabled { opacity:0.3; cursor:default; }
.bpm-val { font-family:’Share Tech Mono’,monospace; font-size:11px; letter-spacing:3px; color:var(--cyan); border-top:1px solid rgba(0,191,255,0.3); border-bottom:1px solid rgba(0,191,255,0.3); padding:0 14px; height:30px; display:flex; align-items:center; min-width:82px; justify-content:center; }

.cat-filter { display:flex; gap:6px; flex-wrap:wrap; justify-content:center; margin-top:10px; max-width:360px; }
.cat-btn { font-family:’Share Tech Mono’,monospace; font-size:8px; letter-spacing:2px; color:var(--text-dim); background:transparent; border:1px solid rgba(0,191,255,0.15); border-radius:3px; padding:4px 8px; cursor:pointer; transition:all 0.2s; outline:none; }
.cat-btn.active { color:var(--gold); border-color:rgba(245,196,0,0.4); }
.cat-btn:hover { border-color:rgba(0,191,255,0.4); color:var(--text); }

.shot-counter { position:absolute; top:20px; left:20px; font-family:’Share Tech Mono’,monospace; font-size:10px; letter-spacing:3px; color:var(--text-dim); text-align:left; line-height:1.6; }
.shot-counter span { display:block; font-size:18px; letter-spacing:1px; color:var(--cyan); }
</style>

</head>
<body>
<div class="app">
  <div class="shot-counter"><span id="shotCountNum">0</span>SHOTS</div>
  <div class="bpm-badge"><span id="bpmBadgeNum">76</span>BPM · 4/4</div>
  <div class="title-block">
    <div class="title-sub">Pre-Shot Routine</div>
    <h1>FLASH GORDON</h1>
  </div>
  <div class="phase-display" id="phaseDisplay">
    <div class="phase-label"  id="phaseLabel">READY</div>
    <div class="phase-cue"    id="phaseCue">Hit play before your shot</div>
    <div class="phase-detail" id="phaseDetail"></div>
    <div class="wisdom-sub"   id="wisdomSub"></div>
  </div>
  <div class="beat-row">
    <div class="beat-dot" id="d0"></div>
    <div class="beat-dot" id="d1"></div>
    <div class="beat-dot" id="d2"></div>
    <div class="beat-dot" id="d3"></div>
  </div>
  <div class="progress-track"><div class="progress-fill" id="progressFill"></div></div>
  <button class="play-btn" id="playBtn" onclick="togglePlay()" aria-label="Play">
    <span class="play-icon">&#9654;</span>
    <span class="stop-icon"></span>
  </button>
  <div class="btn-label" id="btnLabel">PLAY</div>
  <div class="idle-hint" id="idleHint">tap before each shot</div>
  <div class="bpm-control">
    <button class="bpm-adj" id="bpmDn" onclick="adjustBPM(-5)">−</button>
    <span class="bpm-val" id="bpmVal">76 BPM</span>
    <button class="bpm-adj" id="bpmUp" onclick="adjustBPM(+5)">+</button>
  </div>
  <div class="cat-filter" id="catFilter">
    <button class="cat-btn active" data-cat="MECHANICS"   onclick="toggleCat('MECHANICS')">MECH</button>
    <button class="cat-btn active" data-cat="MINDSET"     onclick="toggleCat('MINDSET')">MINDSET</button>
    <button class="cat-btn active" data-cat="POSITION"    onclick="toggleCat('POSITION')">POS</button>
    <button class="cat-btn active" data-cat="SLIP STROKE" onclick="toggleCat('SLIP STROKE')">SLIP</button>
    <button class="cat-btn active" data-cat="PRE-ROUTINE" onclick="toggleCat('PRE-ROUTINE')">PRE</button>
  </div>
</div>
<div class="done-flash" id="doneFlash"></div>

<script>
// ═══════════════════════════════════════════════════════════
// TEMPO — exact, never rounded
// ═══════════════════════════════════════════════════════════
let BPM     = 76;
let BEAT_MS = 60000 / BPM;   // 789.4736842... ms

function adjustBPM(delta) {
  if (running) return;  // don't change mid-routine
  BPM     = Math.min(120, Math.max(50, BPM + delta));
  BEAT_MS = 60000 / BPM;
  document.getElementById('bpmVal').textContent     = BPM + ' BPM';
  document.getElementById('bpmBadgeNum').textContent = BPM;
  document.getElementById('bpmDn').disabled = BPM <= 50;
  document.getElementById('bpmUp').disabled = BPM >= 120;
}

// ═══════════════════════════════════════════════════════════
// WISDOM LIBRARY
// ═══════════════════════════════════════════════════════════
const WISDOM = [

  { cat:'MECHANICS', short:'Head Down',          sub:'chin close to cue — stay down through shot',  speak:'Head down. Chin close to the cue.' },
  { cat:'MECHANICS', short:'Follow Through',     sub:'drive through the cue ball, not to it',       speak:'Follow through. Drive past the cue ball.' },
  { cat:'MECHANICS', short:'Back Foot Weight',   sub:'60% weight back — stable base',               speak:'Weight on your back foot. Stay grounded.' },
  { cat:'MINDSET',   short:'One Shot at a Time', sub:'this shot only — clear everything else',      speak:'One shot at a time. Nothing else exists.' },
  { cat:'MINDSET',   short:'Commit Fully',       sub:'decide, then execute — no second guessing',   speak:'Commit fully. The decision is made.' },
  { cat:'MINDSET',   short:'Trust the Routine',  sub:'you have trained this — let it happen',       speak:'Trust the routine. You have trained this.' },
  { cat:'MINDSET',   short:'Breathe Out',        sub:'exhale fully before the final stroke',        speak:'Breathe out before you shoot.' },
  { cat:'MINDSET',   short:'See the Line',       sub:'visualize the full path before stepping in',  speak:'See the full line before you step in.' },
  { cat:'MINDSET',   short:'Slow is Smooth',     sub:'smooth tempo beats forced power every time',  speak:'Slow is smooth. Smooth is accurate.' },
  { cat:'MINDSET',   short:'Play the Shot',      sub:'not the outcome — execute, then release',     speak:'Play the shot, not the result.' },
  { cat:'POSITION',  short:'Plan Your Leave',    sub:'know where cue ball ends up before you shoot',speak:'Plan your leave. Where is the cue ball going?' },
  { cat:'POSITION',  short:'Speed Control',      sub:'pace beats spin — soft touch wins games',     speak:'Speed control. Soft touch wins games.' },
  { cat:'POSITION',  short:'Natural Angle',      sub:'use the angle the table gives you',           speak:'Use the natural angle. Work with the table.' },

  // ── MECHANICS — advanced ──────────────────────────────────────────────────────
  { cat:'MECHANICS', short:'Dominant Eye',        sub:'align your dominant eye over the shot line',   speak:'Dominant eye over the line. Sight it the same way every time.' },
  { cat:'MECHANICS', short:'Straight Back Swing', sub:'back swing must be as straight as the forward', speak:'Straight back swing. It matters as much as the forward stroke.' },
  { cat:'MECHANICS', short:'Grip Hand Relaxed',   sub:'cradle the cue — tension kills the stroke',    speak:'Relax the grip hand. Cradle it, do not squeeze it.' },
  { cat:'MECHANICS', short:'Tip on Center',       sub:'find center ball before adding spin',           speak:'Strike center ball first. Master that before adding spin.' },
  { cat:'MECHANICS', short:'Chin on Cue',         sub:'lower your chin toward the cue for alignment', speak:'Get your chin down toward the cue. See the line clearly.' },

  { cat:'MECHANICS', short:'Chalk Every Shot',    sub:'chalk is your trigger — it starts the routine', speak:'Chalk up. It tells your brain the routine has begun.' },
  { cat:'MECHANICS', short:'Vision Center',       sub:'position your head so your vision center aligns', speak:'Position your vision center directly over the shot line.' },
  { cat:'MECHANICS', short:'No Steering',         sub:'once committed, let the stroke go — no guiding', speak:'Do not steer the cue. Commit and let it go.' },
  { cat:'MECHANICS', short:'Feet Outside Shoulder', sub:'feet just outside shoulder width — stable base', speak:'Feet just outside shoulder width. Build a stable base.' },

  { cat:'MINDSET',   short:'Process Over Outcome', sub:'focus on execution, not the result',           speak:'Focus on the process. The outcome takes care of itself.' },
  { cat:'MINDSET',   short:'Reset After a Miss',  sub:'shortest emotional recovery wins matches',      speak:'Reset immediately after a miss. Zero carryover.' },
  { cat:'MINDSET',   short:'No Indecision',       sub:'most shots are missed because of indecision',  speak:'Decide standing up. No second guessing once you are down.' },

  { cat:'MINDSET',   short:'Play Your Game',      sub:'do the highest percentage shot YOU know how to make', speak:'Play within your abilities. Do what you know how to do.' },
  { cat:'MINDSET',   short:'Deep Breath',         sub:'one deep exhale resets the nervous system',    speak:'Take one deep breath. Exhale fully. Reset the body.' },

  // ── POSITION — advanced ───────────────────────────────────────────────────────
  { cat:'POSITION',  short:'Cue Ball Path',       sub:'know where the cue ball travels after contact', speak:'Know the cue ball path before you shoot. See it travel.' },
  { cat:'POSITION',  short:'Think Three Ahead',   sub:'plan three shots ahead minimum',               speak:'Think three shots ahead. Know your route before you start.' },

  { cat:'SLIP STROKE', short:'Match the Warm-Ups',  sub:'final stroke must feel identical to practice strokes', speak:'Make the throw feel exactly like your warm-up strokes. No difference.' },
  { cat:'SLIP STROKE', short:'Stay Down Through It', sub:'do not rise on the throw — stay down until the pocket', speak:'Stay down through the throw. Do not come up early.' },
  { cat:'SLIP STROKE', short:'Release Then Catch',  sub:'release flows into the catch — one smooth motion', speak:'Release and catch. One smooth motion, no jab.' },
  { cat:'SLIP STROKE', short:'Grip After Contact',  sub:'regrip naturally completes after the cue ball is struck', speak:'Let the grip come back naturally after contact. Do not force it.' },
  { cat:'SLIP STROKE', short:'Straight Slip Back',  sub:'the slip back must be straight — any angle kills the line', speak:'Slip straight back. Any angle off line will kill the shot.' },
  { cat:'SLIP STROKE', short:'Wrist Loose',         sub:'loose wrist allows the slip to flow through freely', speak:'Keep the wrist loose. A tight wrist blocks the slip.' },

  { cat:'PRE-ROUTINE', short:'Same Every Time',     sub:'identical routine in practice and competition',       speak:'Same routine every time. Practice and competition. No exceptions.' },
];
// ── CATEGORY FILTER ───────────────────────────────────────
const ALL_CATS = ['MECHANICS','MINDSET','POSITION','SLIP STROKE','PRE-ROUTINE'];
let enabledCats = new Set(ALL_CATS);

function toggleCat(cat) {
  if (running) return;
  if (enabledCats.has(cat)) {
    if (enabledCats.size === 1) return;   // keep at least one active
    enabledCats.delete(cat);
  } else {
    enabledCats.add(cat);
  }
  document.querySelectorAll('.cat-btn').forEach(btn => {
    btn.classList.toggle('active', enabledCats.has(btn.dataset.cat));
  });
  wisdomDeck = [];  // reset deck so next draw respects new filter
}

// Shuffled deck — every cue plays once before any repeats
let wisdomDeck = [];
function getShuffledWisdom() {
  if (wisdomDeck.length === 0) {
    // Build filtered pool, fall back to all if somehow empty
    let pool = WISDOM.map((_, i) => i).filter(i => enabledCats.has(WISDOM[i].cat));
    if (pool.length === 0) pool = WISDOM.map((_, i) => i);
    // Fisher-Yates shuffle
    for (let i = pool.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [pool[i], pool[j]] = [pool[j], pool[i]];
    }
    wisdomDeck = pool;
  }
  return WISDOM[wisdomDeck.pop()];
}

// ═══════════════════════════════════════════════════════════
// SEQUENCE
// ms    = exact duration of this step in milliseconds
// click = 'hi'|'mid'|'soft'|'slow'|'shoot'|null
// speak = string | null
// color = 'gold'|'cyan'|'red'|''
// isWisdom = true shows the sub-detail line
// ═══════════════════════════════════════════════════════════
function buildSequence() {
  const B  = BEAT_MS;
  const B2 = BEAT_MS * 2;
  const w  = getShuffledWisdom();

  return [
    //  0  PRE-SHOT WISDOM  (4 beats)
    { ms:B*4, phase:'PRE-SHOT', label:w.cat,         cue:w.short,         detail:w.sub,                              color:'gold', click:null,    speak:w.speak,                      isWisdom:true  },
    //  1  CENTER ON THE LINE (4 beats)
    { ms:B*4, phase:'PHASE 0',  label:'ALIGN',        cue:'Center on the Line', detail:'align your body to the shot line', color:'cyan', click:'soft',  speak:'Decision made. Center on the line.',        isWisdom:false },
    //  2  RIGHT FOOT
    { ms:B,   phase:'PHASE 1',  label:'APPROACH',     cue:'Right Foot',    detail:'plant lead foot · eyes OB',        color:'gold', click:'hi',    speak:'Right foot',                 isWisdom:false },
    //  3  LEFT FOOT
    { ms:B,   phase:'PHASE 1',  label:'APPROACH',     cue:'Left Foot',     detail:'set stance width',                 color:'',     click:'mid',   speak:'Left foot',                  isWisdom:false },
    //  4  BRIDGE DOWN
    { ms:B,   phase:'PHASE 1',  label:'APPROACH',     cue:'Bridge Down',   detail:'lower into address · eyes CB',     color:'cyan', click:'mid',   speak:'Bridge down',                isWisdom:false },
    //  5  ADDRESS PAUSE
    { ms:B,   phase:'PHASE 1',  label:'PAUSE',        cue:'Pause',         detail:'full stillness · breathe out',     color:'red',  click:'soft',  speak:'Pause. Settle.',             isWisdom:false },
    //  6  WU1 BACK
    { ms:B,   phase:'PHASE 2',  label:'WARM-UP 1',    cue:'Back',  detail:'normal pace · drift to stop · OB', color:'red',  click:'mid',   speak:'Back',                       isWisdom:false },
    //  7  WU1 FORWARD
    { ms:B,   phase:'PHASE 2',  label:'WARM-UP 1',    cue:'Forward',       detail:'normal pace · eyes CB',            color:'cyan', click:'hi',    speak:'Forward',                    isWisdom:false },
    //  8  WU2 BACK+LOCK OB
    { ms:B,   phase:'PHASE 2',  label:'WARM-UP 2',    cue:'Back',   detail:'drift to stop · eyes lock OB',     color:'gold', click:'mid',   speak:'Back', isWisdom:false },
    //  9  WU2 FORWARD
    { ms:B,   phase:'PHASE 2',  label:'WARM-UP 2',    cue:'Forward',       detail:'normal pace · eyes CB',            color:'cyan', click:'hi',    speak:'Forward',                    isWisdom:false },
    // 10  EYES LOCKED (settle before slow back)
    { ms:B,   phase:'PHASE 2',  label:'FINAL STROKE', cue:'Eyes Locked',   detail:'lock eyes on OB contact point',    color:'gold', click:'soft',  speak:'Eyes locked.',                      isWisdom:false },
    // 11  FINAL SLOW BACK (2 beats)
    { ms:B2,  phase:'PHASE 2',  label:'SLOW BACK ½x', cue:'Slow... Back',  detail:'half speed · 2 beats · load it',   color:'gold', click:'slow',  speak:'Slow back.',                 isWisdom:false },
    // 12  LOAD PAUSE — completes the 4-beat measure before shoot
    { ms:B,   phase:'PHASE 2',  label:'LOAD',         cue:'Set',           detail:'apex · eyes locked OB · ready',    color:'red',  click:'soft',  speak:null,                         isWisdom:false },
    // 13  SHOOT
    { ms:B,   phase:'PHASE 3',  label:'EXECUTE',      cue:'THROW',         detail:'slip through · eyes on OB',        color:'gold', click:'shoot', speak:'Throw',                      isWisdom:false },
    // 14  HOLD
    { ms:B,   phase:'PHASE 3',  label:'HOLD',         cue:'Hold Position', detail:'stay down · do not lift',          color:'cyan', click:'soft',  speak:'Hold your position.',        isWisdom:false },
    // 15  FREEZE 1
    { ms:B,   phase:'PHASE 3',  label:'FREEZE',       cue:'Stay Down',     detail:'ball is still travelling',         color:'red',  click:'soft',  speak:null,                         isWisdom:false },
    // 16  FREEZE 2
    { ms:B,   phase:'PHASE 3',  label:'FREEZE',       cue:'Stay Down',     detail:'wait for the pocket',              color:'red',  click:'soft',  speak:null,                         isWisdom:false },
  ];
}

// ═══════════════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════════════
let audioCtx  = null;
let running   = false;
let runId     = 0;    // bumped each play/stop — orphans all pending callbacks
let shotCount = 0;

// ═══════════════════════════════════════════════════════════
// WAKE LOCK — keep screen on during routine
// ═══════════════════════════════════════════════════════════
let wakeLock = null;
async function requestWakeLock() {
  if ('wakeLock' in navigator) {
    try { wakeLock = await navigator.wakeLock.request('screen'); } catch {}
  }
}
function releaseWakeLock() {
  if (wakeLock) { wakeLock.release().catch(() => {}); wakeLock = null; }
}
// Re-acquire if the page becomes visible again (e.g. after tab switch)
document.addEventListener('visibilitychange', () => {
  if (running && document.visibilityState === 'visible') requestWakeLock();
});

// ═══════════════════════════════════════════════════════════
// AUDIO
// ═══════════════════════════════════════════════════════════
function initAudio() {
  if (!audioCtx || audioCtx.state === 'closed') {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  }
  if (audioCtx.state === 'suspended') audioCtx.resume();
}

function playClick(type, when) {
  if (!audioCtx) return;
  const map = {
    hi:    [[1200, 1.0,  0.06]],
    mid:   [[800,  0.85, 0.055]],
    soft:  [[500,  0.70, 0.05]],
    slow:  [[560,  0.80, 0.08]],
    shoot: [[120,  1.0,  0.12], [1400, 0.95, 0.07]],
  };
  (map[type] || []).forEach(([freq, amp, dur]) => {
    const osc = audioCtx.createOscillator();
    const env = audioCtx.createGain();
    osc.connect(env);
    env.connect(audioCtx.destination);
    osc.frequency.value = freq;
    env.gain.setValueAtTime(0, when);
    env.gain.linearRampToValueAtTime(amp, when + 0.008);
    env.gain.exponentialRampToValueAtTime(0.001, when + dur);
    osc.start(when);
    osc.stop(when + dur + 0.02);
  });
}

// ═══════════════════════════════════════════════════════════
// SPEECH
// ═══════════════════════════════════════════════════════════
function getBestVoice() {
  const vs = window.speechSynthesis.getVoices();
  if (!vs.length) return null;
  return vs.find(v => v.name === 'Daniel')
      || vs.find(v => v.name === 'Alex')
      || vs.find(v => v.name === 'Samantha')
      || vs.find(v => v.name.includes('Google US English'))
      || vs.find(v => v.lang === 'en-US')
      || vs.find(v => v.lang && v.lang.startsWith('en'))
      || vs[0];
}

// ── SPEECH ────────────────────────────────────────────────
// iOS Safari requires speechSynthesis.speak() to be called
// synchronously in the user gesture call stack.
// Strategy:
//   1. On tap, speak a silent unlock utterance SYNCHRONOUSLY
//   2. Each utterance's onend schedules the next via setTimeout
//      — this is allowed because the engine is now unlocked
// speechPlan is built at tap time: [{text, delayMs}]
let speechPlan   = [];
let speechActive = false;

function makeSpeechUtterance(text) {
  const u = new SpeechSynthesisUtterance(text);
  u.rate   = 0.84;
  u.pitch  = 0.95;
  u.volume = 1.0;
  const v  = getBestVoice();
  if (v) u.voice = v;
  return u;
}

function speakNext(plan, idx, startMs, myRunId) {
  if (idx >= plan.length) { speechActive = false; return; }
  if (!running || runId !== myRunId) { speechActive = false; return; }

  const item    = plan[idx];
  const waitMs  = Math.max(0, startMs + item.delayMs - performance.now());

  setTimeout(() => {
    if (!running || runId !== myRunId) { speechActive = false; return; }
    const u = makeSpeechUtterance(item.text);
    u.onend  = () => speakNext(plan, idx + 1, startMs, myRunId);
    u.onerror = () => speakNext(plan, idx + 1, startMs, myRunId);
    window.speechSynthesis.speak(u);
  }, waitMs);
}

function unlockAndSpeak(plan, myRunId) {
  // Speak a zero-length silent utterance SYNCHRONOUSLY to unlock iOS
  const silent = new SpeechSynthesisUtterance(' ');
  silent.volume = 0;
  silent.rate   = 2;
  const v = getBestVoice();
  if (v) silent.voice = v;
  const startMs = performance.now();
  silent.onend  = () => speakNext(plan, 0, startMs, myRunId);
  silent.onerror = () => speakNext(plan, 0, startMs, myRunId);
  window.speechSynthesis.cancel();
  window.speechSynthesis.speak(silent);
  speechActive = true;
}

// ═══════════════════════════════════════════════════════════
// UI
// ═══════════════════════════════════════════════════════════
function renderStep(s, idx, total) {
  document.getElementById('phaseLabel').textContent  = s.phase + ' · ' + s.label;
  document.getElementById('phaseCue').textContent    = s.cue;
  document.getElementById('phaseCue').className      = 'phase-cue ' + (s.color || '');
  document.getElementById('phaseDetail').textContent = s.detail;

  const wsub = document.getElementById('wisdomSub');
  if (s.isWisdom) {
    wsub.textContent = s.sub || s.detail;
    wsub.classList.add('on');
    document.getElementById('phaseDisplay').style.minHeight = '145px';
  } else {
    wsub.classList.remove('on');
    document.getElementById('phaseDisplay').style.minHeight = '120px';
  }

  // Beat indicator — position within a 4-beat measure
  const beatPos = idx % 4;
  for (let i = 0; i < 4; i++) {
    document.getElementById('d' + i).className =
      'beat-dot' + (i === beatPos ? ' on-' + (s.color || '') : '');
  }

  document.getElementById('progressFill').style.width =
    Math.round((idx + 1) / total * 100) + '%';
}

function renderReady() {
  document.getElementById('phaseLabel').textContent  = 'READY';
  document.getElementById('phaseCue').textContent    = 'Hit play before your shot';
  document.getElementById('phaseCue').className      = 'phase-cue';
  document.getElementById('phaseDetail').textContent = '';
  document.getElementById('wisdomSub').classList.remove('on');
  document.getElementById('phaseDisplay').style.minHeight = '120px';
  document.getElementById('progressFill').style.width = '0%';
  for (let i = 0; i < 4; i++) document.getElementById('d' + i).className = 'beat-dot';
}

function renderComplete() {
  document.getElementById('phaseLabel').textContent  = 'COMPLETE';
  document.getElementById('phaseCue').textContent    = 'Step up. Execute.';
  document.getElementById('phaseCue').className      = 'phase-cue gold';
  document.getElementById('phaseDetail').textContent = '';
  document.getElementById('progressFill').style.width = '100%';
  const fl = document.getElementById('doneFlash');
  fl.classList.add('show');
  setTimeout(() => fl.classList.remove('show'), 350);
}

function setButtons(playing) {
  const btn = document.getElementById('playBtn');
  btn.classList.toggle('playing', playing);
  btn.setAttribute('aria-label', playing ? 'Stop' : 'Play');
  document.getElementById('btnLabel').textContent   = playing ? 'STOP' : 'PLAY';
  document.getElementById('idleHint').style.display = playing ? 'none' : 'block';
}

// ═══════════════════════════════════════════════════════════
// ENGINE
// Chain of setTimeout calls — each step schedules the next.
// runId guards against orphaned callbacks after stop().
// ═══════════════════════════════════════════════════════════
function runStep(seq, idx, myRunId) {
  if (!running || runId !== myRunId) return;  // orphan guard

  const s     = seq[idx];
  const total = seq.length;
  const now   = performance.now();

  // 1. Render UI
  renderStep(s, idx, total);

  // 2. Audio click — schedule slightly ahead in audio time
  if (s.click && audioCtx) {
    playClick(s.click, audioCtx.currentTime + 0.015);
  }

  // 3. Schedule next step after this step's duration
  const nextIdx = idx + 1;
  if (nextIdx < total) {
    setTimeout(() => runStep(seq, nextIdx, myRunId), s.ms);
  } else {
    // Last step — wait its full duration then finish
    setTimeout(() => {
      if (!running || runId !== myRunId) return;
      finish();
    }, s.ms);
  }
}

function start() {
  initAudio();
  requestWakeLock();
  window.speechSynthesis.cancel();
  speechActive = false;
  speechPlan   = [];
  running = true;
  runId++;
  const myRunId = runId;
  const seq     = buildSequence();

  setButtons(true);

  // Build speech plan — delays relative to NOW (tap moment)
  // All speech is unlocked synchronously below before countdown starts
  const COUNTDOWN_MS = 3000;
  const plan = [];
  let t = COUNTDOWN_MS + 100; // ms from now
  for (let i = 0; i < seq.length; i++) {
    const s = seq[i];
    if (s.speak) {
      const offset = (s.label === 'HOLD') ? 450 : 0;
      plan.push({ text: s.speak, delayMs: t + offset });
    }
    t += s.ms;
  }
  // SYNCHRONOUS unlock — must happen inside the tap handler call stack
  unlockAndSpeak(plan, myRunId);

  // 3-second countdown display + audio ticks
  let countdown = 3;
  const cdEl    = document.getElementById('phaseCue');
  const cdLabel = document.getElementById('phaseLabel');
  cdLabel.textContent = 'GET READY';
  cdEl.textContent    = countdown;
  cdEl.className      = 'phase-cue gold';
  if (audioCtx) playClick('soft', audioCtx.currentTime + 0.05);

  const cdInterval = setInterval(() => {
    if (!running || runId !== myRunId) { clearInterval(cdInterval); return; }
    countdown--;
    if (countdown > 0) {
      cdEl.textContent = countdown;
      if (audioCtx) playClick('soft', audioCtx.currentTime + 0.05);
    } else {
      clearInterval(cdInterval);
      cdEl.textContent = '';
      runStep(seq, 0, myRunId);
    }
  }, 1000);
}

function finish() {
  running = false;
  releaseWakeLock();
  shotCount++;
  document.getElementById('shotCountNum').textContent = shotCount;
  setButtons(false);
  renderComplete();
}

function stop() {
  running = false;
  runId++;
  releaseWakeLock();
  speechActive = false;
  speechPlan   = [];
  window.speechSynthesis.cancel();
  setButtons(false);
  renderReady();
}

function togglePlay() {
  if (running) stop(); else start();
}

// ═══════════════════════════════════════════════════════════
// VOICE PRELOAD
// ═══════════════════════════════════════════════════════════
window.speechSynthesis.getVoices();
window.speechSynthesis.onvoiceschanged = () => window.speechSynthesis.getVoices();
document.getElementById('playBtn').addEventListener('click', () => {
  if (window.speechSynthesis.paused) window.speechSynthesis.resume();
});

// ═══════════════════════════════════════════════════════════
// KEYBOARD SHORTCUT — space / enter to play·stop
// ═══════════════════════════════════════════════════════════
document.addEventListener('keydown', e => {
  if ((e.code === 'Space' || e.code === 'Enter') && !e.repeat) {
    e.preventDefault();
    togglePlay();
  }
});

// ═══════════════════════════════════════════════════════════
// SERVICE WORKER
// ═══════════════════════════════════════════════════════════
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => navigator.serviceWorker.register('./sw.js'));
}
</script>
