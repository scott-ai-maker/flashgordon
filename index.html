<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Flash Gordon — Pre-Shot</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&family=Exo+2:ital,wght@0,300;0,400;0,600;0,700;1,300&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
  :root {
    --gold: #C9A84C; --gold-dim: #7a5c20;
    --cyan: #00bfff; --cyan-dim: #005f80;
    --dark: #080f18; --dark2: #0d1b2a; --dark3: #1a2d42;
    --red: #ff4444; --text: #e8e8e8; --text-dim: #9ab0c8;
  }
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body { height:100%; background:var(--dark); color:var(--text); font-family:'Exo 2',sans-serif; overflow:hidden; }

  body::before { content:''; position:fixed; inset:0; pointer-events:none; z-index:0;
    background-image:linear-gradient(rgba(0,191,255,.04) 1px,transparent 0),linear-gradient(90deg,rgba(0,191,255,.04) 1px,transparent 0);
    background-size:60px 60px; }
  body::after { content:''; position:fixed; inset:0; pointer-events:none; z-index:0;
    background:
      radial-gradient(ellipse at 50% 0%,rgba(0,191,255,0.07) 0%,transparent 55%),
      radial-gradient(ellipse at 85% 100%,rgba(201,168,76,0.06) 0%,transparent 45%); }

.app { height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:20px; position:relative; z-index:1; }

.bpm-badge { position:absolute; top:20px; right:20px; font-family:'Share Tech Mono',monospace; font-size:10px; letter-spacing:3px; color:var(--text-dim); text-align:right; line-height:1.6; }
.bpm-badge span { display:block; font-size:18px; letter-spacing:1px; color:var(--cyan); }

.title-block { text-align:center; margin-bottom:18px; }
.title-sub { font-family:'Share Tech Mono',monospace; font-size:9px; letter-spacing:6px; color:var(--cyan); margin-bottom:6px; opacity:0.7; }
h1 { font-family:'Orbitron',sans-serif; font-weight:900; font-size:clamp(28px,9vw,58px); letter-spacing:6px; line-height:1; }
h1 .word-flash  { color:var(--text); filter:drop-shadow(0 0 12px rgba(232,232,232,0.2)); }
h1 .word-gordon { color:var(--gold); filter:drop-shadow(0 0 18px rgba(201,168,76,0.55)) drop-shadow(0 0 36px rgba(201,168,76,0.25)); }

.phase-display { width:100%; max-width:420px; background:rgba(13,27,42,0.85); border:1px solid rgba(0,191,255,0.2); border-radius:6px; padding:18px 24px; margin-bottom:14px; min-height:96px; display:flex; flex-direction:column; justify-content:center; position:relative; overflow:hidden;
  box-shadow:0 0 20px rgba(0,191,255,.08), inset 0 0 40px rgba(0,191,255,.02); }
.phase-display::before { content:''; position:absolute; top:0; left:0; right:0; height:2px; background:linear-gradient(90deg,transparent,var(--bar-color,var(--cyan)),transparent); opacity:0.6; }

.phase-label { font-family:'Share Tech Mono',monospace; font-size:9px; letter-spacing:4px; color:var(--text-dim); margin-bottom:8px; text-transform:uppercase; }
.phase-cue { font-family:'Orbitron',sans-serif; font-weight:700; font-size:clamp(18px,5vw,28px); letter-spacing:2px; color:var(--text); line-height:1.2; transition:color 0.15s; }
.phase-cue.gold { color:var(--gold); text-shadow:0 0 20px rgba(201,168,76,.6),0 0 40px rgba(201,168,76,.3); }
.phase-cue.cyan { color:var(--cyan); text-shadow:0 0 20px rgba(0,191,255,.6),0 0 40px rgba(0,191,255,.3); }
.phase-cue.red  { color:var(--red);  text-shadow:0 0 20px rgba(255,68,68,.6); }
.phase-detail { font-family:'Exo 2',sans-serif; font-size:12px; letter-spacing:0.5px; color:var(--text-dim); margin-top:6px; font-weight:400; }

.beat-row { display:flex; gap:8px; margin-bottom:14px; }
.beat-dot { width:10px; height:10px; border-radius:50%; background:var(--dark3); border:1px solid rgba(0,191,255,0.15); transition:all 0.05s; }
.beat-dot.on-gold { background:var(--gold); box-shadow:0 0 20px rgba(201,168,76,.4),0 0 40px rgba(201,168,76,.2); transform:scale(1.3); }
.beat-dot.on-cyan { background:var(--cyan); box-shadow:0 0 20px rgba(0,191,255,.4),0 0 40px rgba(0,191,255,.2); transform:scale(1.3); }
.beat-dot.on-red  { background:var(--red);  box-shadow:0 0 20px rgba(255,68,68,.4); transform:scale(1.3); }
.beat-dot.on-     { background:var(--text); box-shadow:0 0 8px rgba(232,232,232,0.4); transform:scale(1.3); }

.progress-track { width:100%; max-width:420px; height:2px; background:rgba(0,191,255,0.1); border-radius:1px; margin-bottom:18px; overflow:hidden; }
.progress-fill  { height:100%; background:linear-gradient(90deg,var(--cyan),var(--gold)); width:0%; transition:width 0.15s linear; }

.play-btn {
width:110px; height:110px; border-radius:50%;
background: radial-gradient(circle at 38% 35%, #e8c97a, #C9A84C 45%, #7a5c20 100%);
border: 3px solid rgba(201,168,76,0.4);
box-shadow: 0 4px 0 rgba(60,40,0,0.8), 0 6px 30px rgba(201,168,76,0.35), 0 0 20px rgba(201,168,76,.4),0 0 40px rgba(201,168,76,.2), inset 0 2px 4px rgba(232,201,122,0.3);
cursor:pointer; display:flex; align-items:center; justify-content:center;
position:relative; transition:transform 0.1s, box-shadow 0.1s; outline:none;
}
.play-btn:hover { transform:scale(1.04); box-shadow: 0 4px 0 rgba(60,40,0,0.8), 0 8px 40px rgba(201,168,76,0.5), 0 0 40px rgba(201,168,76,.5),0 0 60px rgba(201,168,76,.25), inset 0 2px 4px rgba(232,201,122,0.3); }
.play-btn:active { transform:scale(0.96) translateY(3px); box-shadow: 0 1px 0 rgba(60,40,0,0.8), 0 3px 12px rgba(201,168,76,0.3), inset 0 2px 4px rgba(232,201,122,0.15); }
.play-btn.playing {
background: radial-gradient(circle at 38% 35%, #1a2a3a, #0d1b2a 45%, #080f18 100%);
border: 3px solid rgba(0,191,255,0.3);
box-shadow: 0 4px 0 #000, 0 0 20px rgba(0,191,255,.4),0 0 40px rgba(0,191,255,.2), inset 0 2px 4px rgba(255,255,255,0.05);
animation: pulse 1.0s ease-in-out infinite;
}
@keyframes pulse { 0%{box-shadow:0 4px 0 #000,0 0 20px rgba(0,191,255,.4),0 0 0 0 rgba(0,191,255,0.5)} 70%{box-shadow:0 4px 0 #000,0 0 20px rgba(0,191,255,.4),0 0 0 20px rgba(0,191,255,0)} 100%{box-shadow:0 4px 0 #000,0 0 20px rgba(0,191,255,.4),0 0 0 0 rgba(0,191,255,0)} }
.play-icon { font-size:44px; color:#1a0e00; margin-left:6px; line-height:1; filter:drop-shadow(0 1px 0 rgba(232,201,122,0.5)); }
.stop-icon { width:26px; height:26px; background:var(--cyan); border-radius:3px; display:none; box-shadow:0 0 20px rgba(0,191,255,.4),0 0 40px rgba(0,191,255,.2); }
.play-btn.playing .play-icon { display:none; }
.play-btn.playing .stop-icon { display:block; }

.btn-label  { margin-top:8px; font-family:'Share Tech Mono',monospace; font-size:10px; letter-spacing:4px; color:var(--text-dim); }
.idle-hint  { font-family:'Share Tech Mono',monospace; font-size:10px; letter-spacing:3px; color:var(--text-dim); margin-top:8px; opacity:0.5; }
.done-flash { position:fixed; inset:0; background:rgba(201,168,76,0.05); pointer-events:none; opacity:0; transition:opacity 0.1s; z-index:50; }
.done-flash.show { opacity:1; }

.bpm-control { display:flex; align-items:center; margin-top:12px; }
.bpm-adj { font-family:'Share Tech Mono',monospace; font-size:16px; color:var(--cyan); background:transparent; border:1px solid rgba(0,191,255,0.3); width:30px; height:30px; cursor:pointer; transition:all 0.2s; outline:none; display:flex; align-items:center; justify-content:center; line-height:1; }
.bpm-adj:first-child { border-radius:15px 0 0 15px; }
.bpm-adj:last-child  { border-radius:0 15px 15px 0; }
.bpm-adj:hover:not(:disabled) { color:var(--gold); border-color:rgba(201,168,76,0.5); background:rgba(201,168,76,0.05); }
.bpm-adj:disabled { opacity:0.3; cursor:default; }
.bpm-val { font-family:'Share Tech Mono',monospace; font-size:11px; letter-spacing:3px; color:var(--cyan); border-top:1px solid rgba(0,191,255,0.3); border-bottom:1px solid rgba(0,191,255,0.3); padding:0 14px; height:30px; display:flex; align-items:center; min-width:82px; justify-content:center; }

.shot-counter { position:absolute; top:20px; left:20px; font-family:'Share Tech Mono',monospace; font-size:10px; letter-spacing:3px; color:var(--text-dim); text-align:left; line-height:1.6; }
.shot-counter span { display:block; font-size:18px; letter-spacing:1px; color:var(--cyan); }

/* ── Session panel ─────────────────────────────────────── */
.session-panel { display:flex; justify-content:center; margin-top:12px; }
.session-btn {
  font-family:'Share Tech Mono',monospace; font-size:10px; letter-spacing:3px;
  color:var(--text-dim); background:transparent;
  border:1px solid rgba(0,191,255,0.25); border-radius:20px;
  padding:7px 20px; cursor:pointer; transition:all 0.2s; outline:none;
  display:flex; align-items:center; gap:10px;
}
.session-btn:hover { color:var(--cyan); border-color:rgba(0,191,255,0.5); }
.session-btn.active {
  color:var(--red); border-color:rgba(255,68,68,0.5);
  background:rgba(255,68,68,0.05);
  box-shadow:0 0 12px rgba(255,68,68,0.15);
}
.session-live { font-family:'Orbitron',sans-serif; font-size:13px; color:var(--red); letter-spacing:1px; display:none; }
.session-btn.active .session-live { display:inline; }

/* ── Stats strip ───────────────────────────────────────── */
.stats-strip { display:flex; width:100%; max-width:420px; margin-top:10px; border:1px solid rgba(0,191,255,0.1); border-radius:4px; overflow:hidden; }
.stat-cell { flex:1; text-align:center; padding:7px 2px; border-right:1px solid rgba(0,191,255,0.1); }
.stat-cell:last-child { border-right:none; }
.stat-val { font-family:'Orbitron',sans-serif; font-size:11px; letter-spacing:1px; color:var(--cyan); }
.stat-val.gold { color:var(--gold); }
.stat-lbl { font-family:'Share Tech Mono',monospace; font-size:7px; letter-spacing:3px; color:var(--text-dim); margin-top:3px; }

/* ── Analysis trigger ─────────────────────────────────── */
.analysis-btn { font-family:'Share Tech Mono',monospace; font-size:8px; letter-spacing:3px; color:var(--text-dim); background:transparent; border:none; cursor:pointer; margin-top:7px; padding:3px 0; opacity:0.55; transition:all 0.2s; outline:none; }
.analysis-btn:hover { opacity:1; color:var(--cyan); }

/* ── Analytics overlay ─────────────────────────────────── */
.analytics-overlay { display:none; position:fixed; inset:0; background:rgba(4,8,14,0.96); z-index:100; flex-direction:column; align-items:center; overflow-y:auto; padding:24px 20px 40px; }
.analytics-panel { width:100%; max-width:420px; }
.analytics-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:20px; }
.analytics-title { font-family:'Share Tech Mono',monospace; font-size:10px; letter-spacing:5px; color:var(--cyan); }
.analytics-close { font-family:'Share Tech Mono',monospace; font-size:14px; color:var(--text-dim); background:transparent; border:1px solid rgba(255,255,255,0.1); border-radius:3px; width:28px; height:28px; cursor:pointer; outline:none; transition:all 0.15s; }
.analytics-close:hover { color:var(--text); border-color:rgba(255,255,255,0.3); }
.analytics-tabs { display:flex; gap:6px; margin-bottom:20px; }
.atab { font-family:'Share Tech Mono',monospace; font-size:9px; letter-spacing:3px; color:var(--text-dim); background:transparent; border:1px solid rgba(0,191,255,0.15); border-radius:3px; padding:5px 12px; cursor:pointer; outline:none; transition:all 0.15s; }
.atab.active { color:var(--cyan); border-color:rgba(0,191,255,0.5); background:rgba(0,191,255,0.06); }
.fault-callout { background:rgba(255,68,68,0.06); border:1px solid rgba(255,68,68,0.2); border-radius:6px; padding:16px 20px; margin-bottom:16px; }
.fault-label { font-family:'Share Tech Mono',monospace; font-size:8px; letter-spacing:4px; color:var(--text-dim); margin-bottom:6px; }
.fault-name { font-family:'Orbitron',sans-serif; font-size:26px; font-weight:700; color:var(--red); letter-spacing:3px; }
.fault-sub { font-family:'Exo 2',sans-serif; font-size:11px; color:var(--text-dim); margin-top:5px; }
.trend { font-family:'Share Tech Mono',monospace; font-size:9px; letter-spacing:1px; margin-left:6px; }
.trend.worse  { color:var(--red); }
.trend.better { color:#00d4aa; }
.trend.neutral { color:var(--text-dim); }
.rate-row { display:flex; align-items:baseline; gap:6px; margin-bottom:16px; padding:10px 14px; border:1px solid rgba(0,191,255,0.1); border-radius:4px; }
.rate-big { font-family:'Orbitron',sans-serif; font-size:22px; color:var(--cyan); letter-spacing:1px; }
.rate-lbl { font-family:'Share Tech Mono',monospace; font-size:8px; letter-spacing:2px; color:var(--text-dim); }
.error-bars { margin-bottom:12px; display:flex; flex-direction:column; gap:8px; }
.error-bar-row { display:grid; grid-template-columns:62px 1fr 34px 26px; align-items:center; gap:8px; }
.error-bar-label { font-family:'Share Tech Mono',monospace; font-size:8px; letter-spacing:1px; color:var(--text-dim); text-align:right; }
.error-bar-track { height:6px; background:rgba(255,255,255,0.05); border-radius:3px; overflow:hidden; }
.error-bar-fill { height:100%; background:linear-gradient(90deg,rgba(255,68,68,0.6),var(--red)); border-radius:3px; transition:width 0.4s ease; }
.error-bar-pct { font-family:'Orbitron',sans-serif; font-size:9px; color:var(--text); text-align:right; }
.error-bar-cnt { font-family:'Share Tech Mono',monospace; font-size:8px; color:var(--text-dim); }
.error-totals { font-family:'Share Tech Mono',monospace; font-size:8px; letter-spacing:2px; color:var(--text-dim); text-align:center; padding-top:10px; border-top:1px solid rgba(255,255,255,0.05); }
.no-data { font-family:'Exo 2',sans-serif; font-size:13px; color:var(--text-dim); text-align:center; padding:40px 20px; line-height:1.8; }

/* ── Weekly goal bar ───────────────────────────────────── */
.goal-section { width:100%; max-width:420px; margin-top:10px; padding:10px 14px; border:1px solid rgba(0,191,255,0.1); border-radius:4px; background:rgba(13,27,42,0.4); }
.goal-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:8px; }
.goal-label { font-family:'Share Tech Mono',monospace; font-size:8px; letter-spacing:4px; color:var(--text-dim); }
.goal-controls { display:flex; align-items:center; gap:8px; }
.goal-adj { font-family:'Share Tech Mono',monospace; font-size:13px; color:var(--cyan); background:transparent; border:1px solid rgba(0,191,255,0.25); border-radius:3px; width:22px; height:22px; cursor:pointer; outline:none; display:flex; align-items:center; justify-content:center; transition:all 0.15s; }
.goal-adj:hover { color:var(--gold); border-color:rgba(201,168,76,0.4); }
#goalTarget { font-family:'Orbitron',sans-serif; font-size:11px; color:var(--cyan); min-width:30px; text-align:center; }
.goal-bar-track { height:6px; background:rgba(255,255,255,0.05); border-radius:3px; overflow:hidden; margin-bottom:6px; }
.goal-bar-fill { height:100%; background:linear-gradient(90deg,var(--cyan),var(--gold)); border-radius:3px; transition:width 0.5s ease; }
.goal-bar-fill.done { background:linear-gradient(90deg,var(--gold),#e8c97a); box-shadow:0 0 8px rgba(201,168,76,0.4); }
.goal-footer { display:flex; justify-content:space-between; }
.goal-reps { font-family:'Orbitron',sans-serif; font-size:10px; color:var(--text); }
.goal-pct  { font-family:'Share Tech Mono',monospace; font-size:9px; color:var(--text-dim); }
.goal-pct.done { color:var(--gold); }

/* ── Outcome buttons ───────────────────────────────────── */
.outcome-row { display:flex; gap:8px; width:100%; margin-bottom:12px; }
.outcome-btn { flex:1; font-family:'Orbitron',sans-serif; font-size:10px; font-weight:700; letter-spacing:1px; padding:9px 4px; border-radius:4px; cursor:pointer; outline:none; transition:all 0.15s; border:1px solid; background:transparent; }
.outcome-btn.made   { color:#00d4aa; border-color:rgba(0,212,170,0.3); }
.outcome-btn.missed { color:var(--red);  border-color:rgba(255,68,68,0.3); }
.outcome-btn.pos    { color:var(--gold); border-color:rgba(201,168,76,0.3); }
.outcome-btn.made:hover,   .outcome-btn.made.selected   { background:rgba(0,212,170,0.12);  border-color:rgba(0,212,170,0.6);  }
.outcome-btn.missed:hover, .outcome-btn.missed.selected { background:rgba(255,68,68,0.12);  border-color:rgba(255,68,68,0.6);  }
.outcome-btn.pos:hover,    .outcome-btn.pos.selected    { background:rgba(201,168,76,0.12); border-color:rgba(201,168,76,0.6); }

/* ── Outcome bars (reuse error-bar-* with colour overrides) */
.error-bar-fill.out-made   { background:linear-gradient(90deg,rgba(0,212,170,0.5),#00d4aa); }
.error-bar-fill.out-missed { background:linear-gradient(90deg,rgba(255,68,68,0.5),var(--red)); }
.error-bar-fill.out-pos    { background:linear-gradient(90deg,rgba(201,168,76,0.5),var(--gold)); }

/* ── Process vs Result section ─────────────────────────── */
.section-divider { height:1px; background:rgba(0,191,255,0.08); margin:18px 0 14px; }
.section-title { font-family:'Share Tech Mono',monospace; font-size:9px; letter-spacing:4px; color:var(--text-dim); margin-bottom:12px; }
.pvr-section { border:1px solid rgba(0,191,255,0.1); border-radius:4px; overflow:hidden; margin-top:14px; }
.pvr-header { font-family:'Share Tech Mono',monospace; font-size:8px; letter-spacing:4px; color:var(--text-dim); padding:8px 12px; border-bottom:1px solid rgba(0,191,255,0.08); background:rgba(0,191,255,0.03); }
.pvr-row { display:grid; grid-template-columns:1fr auto auto; align-items:center; gap:12px; padding:9px 12px; border-bottom:1px solid rgba(0,191,255,0.05); }
.pvr-row:last-child { border-bottom:none; }
.pvr-desc { font-family:'Exo 2',sans-serif; font-size:11px; color:var(--text-dim); }
.pvr-rate { font-family:'Orbitron',sans-serif; font-size:14px; font-weight:700; }
.pvr-rate.good { color:#00d4aa; }
.pvr-rate.mid  { color:var(--gold); }
.pvr-rate.bad  { color:var(--red); }
.pvr-n { font-family:'Share Tech Mono',monospace; font-size:8px; color:var(--text-dim); white-space:nowrap; }
.pvr-insight { font-family:'Exo 2',sans-serif; font-size:11px; color:var(--text-dim); font-style:italic; padding:10px 12px; border-top:1px solid rgba(0,191,255,0.08); line-height:1.5; background:rgba(0,191,255,0.02); }

/* ── Error log panel ───────────────────────────────────── */
.error-panel { display:none; width:100%; max-width:420px; margin-top:12px; }
.error-panel-label { font-family:'Share Tech Mono',monospace; font-size:9px; letter-spacing:4px; color:var(--text-dim); margin-bottom:8px; text-align:center; }
.error-btns { display:flex; gap:6px; flex-wrap:wrap; justify-content:center; }
.err-btn { font-family:'Share Tech Mono',monospace; font-size:8px; letter-spacing:2px; color:var(--text-dim); background:transparent; border:1px solid rgba(255,68,68,0.25); border-radius:3px; padding:5px 10px; cursor:pointer; transition:all 0.15s; outline:none; position:relative; }
.err-btn:hover { color:var(--red); border-color:rgba(255,68,68,0.5); }
.err-btn.hit { color:var(--red); border-color:rgba(255,68,68,0.65); background:rgba(255,68,68,0.1); }
.err-count { font-size:7px; position:absolute; top:-5px; right:-4px; background:var(--red); color:#fff; border-radius:50%; width:12px; height:12px; display:none; align-items:center; justify-content:center; line-height:1; }
.err-count.show { display:flex; }

/* ── Trigger row ───────────────────────────────────────── */
.trigger-row { display:flex; gap:28px; justify-content:center; }
.drills-btn { font-family:'Share Tech Mono',monospace; font-size:8px; letter-spacing:3px; color:var(--text-dim); background:transparent; border:none; cursor:pointer; margin-top:7px; padding:3px 0; opacity:0.55; transition:all 0.2s; outline:none; }
.drills-btn:hover { opacity:1; color:var(--gold); }

/* ── Drills overlay ─────────────────────────────────────── */
.drills-overlay { display:none; position:fixed; inset:0; background:rgba(4,8,14,0.96); z-index:100; flex-direction:column; align-items:center; overflow-y:auto; padding:24px 20px 40px; }
.drills-panel { width:100%; max-width:420px; }
.drills-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:20px; }
.drills-title { font-family:'Share Tech Mono',monospace; font-size:10px; letter-spacing:5px; color:var(--gold); }
.drills-close { font-family:'Share Tech Mono',monospace; font-size:14px; color:var(--text-dim); background:transparent; border:1px solid rgba(255,255,255,0.1); border-radius:3px; width:28px; height:28px; cursor:pointer; outline:none; transition:all 0.15s; }
.drills-close:hover { border-color:var(--gold); color:var(--gold); }

/* Drill cards */

<script>
// ═══════════════════════════════════════════════════════════
// TEMPO
// ═══════════════════════════════════════════════════════════
let BPM     = 60;
let BEAT_MS = 60000 / BPM;

function adjustBPM(delta) {
  if (running) return;
  BPM     = Math.min(120, Math.max(50, BPM + delta));
  BEAT_MS = 60000 / BPM;
  document.getElementById('bpmVal').textContent      = BPM + ' BPM';
  document.getElementById('bpmBadgeNum').textContent = BPM;
  document.getElementById('bpmDn').disabled = BPM <= 50;
  document.getElementById('bpmUp').disabled = BPM >= 120;
}

// ═══════════════════════════════════════════════════════════
// SEQUENCE — Orthodox Fundamentals · 10 beats · 60 BPM
// ═══════════════════════════════════════════════════════════
function buildSequence() {
  const B = BEAT_MS;
  return [
    { ms:B, phase:'BEAT 1',  label:'DECISION',   cue:'COMMIT',  detail:'lock in shot · speed · leave',              color:'gold', click:'hi',    speak:'Commit'                  },
    { ms:B, phase:'BEAT 2',  label:'APPROACH',   cue:'STEP',    detail:'lead foot into the line of aim',            color:'cyan', click:'mid',   speak:'Step'                    },
    { ms:B, phase:'BEAT 3',  label:'PLACEMENT',  cue:'DOWN',    detail:'drop into stance · tip near cue ball',      color:'gold', click:'mid',   speak:'Down'                    },
    { ms:B, phase:'BEAT 4',  label:'VERIFY',     cue:'CHECK',   detail:'CB → OB → CB · confirm aim',                color:'cyan', click:'soft',  speak:'Check'                   },
    { ms:B, phase:'BEAT 5',  label:'RHYTHM 1',   cue:'STROKE',  detail:'first slow straight practice swing',        color:'gold', click:'mid',   speak:'Stroke'                  },
    { ms:B, phase:'BEAT 6',  label:'RHYTHM 2',   cue:'MATCH',   detail:'second swing · match intended length',      color:'cyan', click:'mid',   speak:'Match'                   },
    { ms:B, phase:'BEAT 7',  label:'PAUSE',      cue:'STILL',   detail:'total stillness · final visual check',      color:'red',  click:'pause', speak:'Still'                   },
    { ms:B, phase:'BEAT 8',  label:'TRANSITION', cue:'SHIFT',   detail:'eyes lock target · slow backswing begins',  color:'gold', click:'slow',  speak:'Shift'                   },
    { ms:B, phase:'BEAT 9',  label:'DELIVERY',   cue:'THROUGH', detail:'fixed elbow · smooth acceleration',         color:'gold', click:'shoot', speak:'Through', speakRate:0.70 },
    { ms:B, phase:'BEAT 10', label:'EVALUATE',   cue:'HOLD',    detail:'total stillness · evaluate tip position',   color:'red',  click:'soft',  speak:'Hold'                    },
  ];
}

// ═══════════════════════════════════════════════════════════
// SHOT LOG — per-shot outcome + error data
// Each shot: { id, date, sessionStart, outcome, errors }
// ═══════════════════════════════════════════════════════════
const SHOTS_KEY = 'fg_shots';
let shotErrors  = {};   // errors for the current rep only — resets each PLAY
let pendingShot = null; // shot waiting for outcome tap

function getShots() {
  try { return JSON.parse(localStorage.getItem(SHOTS_KEY) || '[]'); } catch { return []; }
}
function saveShot(shot) {
  const shots = getShots();
  const idx   = shots.findIndex(s => s.id === shot.id);
  if (idx >= 0) shots[idx] = shot; else shots.push(shot);
  localStorage.setItem(SHOTS_KEY, JSON.stringify(shots));
}
function shotsInRange(fromStr, toStr) {
  return getShots().filter(s => s.date >= fromStr && (!toStr || s.date < toStr));
}

function logOutcome(outcome, btn) {
  if (!pendingShot) pendingShot = { id: Date.now(), date: dateKey(new Date()), sessionStart: sessionStartTs, errors: {} };
  pendingShot.outcome = outcome;
  saveShot(pendingShot);
  document.querySelectorAll('.outcome-btn').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
}

// ═══════════════════════════════════════════════════════════
// ERROR LOG
// ═══════════════════════════════════════════════════════════
const errorCounts = {};

function logError(label, btn) {
  errorCounts[label] = (errorCounts[label] || 0) + 1;
  shotErrors[label]  = (shotErrors[label]  || 0) + 1;
  const countEl = document.getElementById('ec-' + label);
  if (countEl) { countEl.textContent = errorCounts[label]; countEl.classList.add('show'); }
  if (btn) { btn.classList.add('hit'); setTimeout(() => btn.classList.remove('hit'), 350); }
  if (window.speechSynthesis) {
    window.speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(label);
    u.rate = 0.88; u.pitch = 0.88; u.volume = 0.85;
    const v = getBestVoice(); if (v) u.voice = v;
    window.speechSynthesis.speak(u);
  }
}

// ═══════════════════════════════════════════════════════════
// SESSION TRACKING
// Each session: { date, start, end, duration, shots, errors }
// Persisted as JSON array in localStorage key 'fg_sessions'
// ═══════════════════════════════════════════════════════════
const SESSIONS_KEY = 'fg_sessions';
let sessionActive        = false;
let sessionStartTs       = null;   // Date.now() when session began
let sessionShotBaseline  = 0;      // shotCount at session start
let sessionAbortCount    = 0;      // reps stopped mid-run this session
let sessionTickInterval  = null;

function getSessions() {
  try { return JSON.parse(localStorage.getItem(SESSIONS_KEY) || '[]'); } catch { return []; }
}

function dateKey(d) { return new Date(d).toISOString().slice(0, 10); }

function formatTime(ms) {
  if (!ms || ms < 1000) return '—';
  const s = Math.floor(ms / 1000);
  const m = Math.floor(s / 60);
  const h = Math.floor(m / 60);
  if (h > 0) return h + 'h ' + (m % 60 > 0 ? (m % 60) + 'm' : '');
  if (m > 0) return m + 'm' + (s % 60 > 0 ? ' ' + (s % 60) + 's' : '');
  return s + 's';
}

function formatClock(ms) {
  // MM:SS for the live session timer
  const s = Math.floor(ms / 1000);
  return String(Math.floor(s / 60)).padStart(2, '0') + ':' + String(s % 60).padStart(2, '0');
}

function startSession() {
  if (sessionActive) return;
  sessionActive       = true;
  sessionStartTs      = Date.now();
  sessionShotBaseline = shotCount;
  sessionAbortCount   = 0;
  // Reset error counts so this session starts clean
  ERROR_TYPES.forEach(e => { errorCounts[e] = 0; document.getElementById('ec-' + e).textContent = ''; document.getElementById('ec-' + e).classList.remove('show'); });

  const btn = document.getElementById('sessionBtn');
  btn.classList.add('active');
  document.getElementById('sessionBtnText').textContent = '■ END SESSION';

  // Tick the live timer every second
  sessionTickInterval = setInterval(() => {
    document.getElementById('sessionLive').textContent =
      formatClock(Date.now() - sessionStartTs);
  }, 1000);

  updateStats();
}

function endSession() {
  if (!sessionActive) return;
  clearInterval(sessionTickInterval);

  const duration = Date.now() - sessionStartTs;
  const shots    = shotCount - sessionShotBaseline;

  const sessions = getSessions();
  const errors = {};
  ERROR_TYPES.forEach(e => { if (errorCounts[e]) errors[e] = errorCounts[e]; });
  sessions.push({ date: dateKey(new Date()), start: sessionStartTs, end: Date.now(), duration, shots, aborts: sessionAbortCount, errors });
  localStorage.setItem(SESSIONS_KEY, JSON.stringify(sessions));

  sessionActive  = false;
  sessionStartTs = null;

  const btn = document.getElementById('sessionBtn');
  btn.classList.remove('active');
  document.getElementById('sessionBtnText').textContent = '● START SESSION';
  document.getElementById('sessionLive').textContent    = '00:00';

  updateStats();
}

function toggleSession() { if (sessionActive) endSession(); else startSession(); }

// Auto-end session if user closes/navigates away
window.addEventListener('beforeunload', () => { if (sessionActive) endSession(); });

// ── Stats computation ───────────────────────────────────
function sumSessions(sessions, fromDate) {
  const filtered = sessions.filter(s => new Date(s.date) >= fromDate);
  return {
    duration: filtered.reduce((a, s) => a + s.duration, 0),
    shots:    filtered.reduce((a, s) => a + s.shots, 0),
    aborts:   filtered.reduce((a, s) => a + (s.aborts || 0), 0),
    days:     new Set(filtered.map(s => s.date)).size,
  };
}

function calcStreak() {
  const sessions = getSessions();
  if (!sessions.length) return 0;
  const dates = [...new Set(sessions.map(s => s.date))].sort().reverse();
  const today = dateKey(new Date());
  const yesterday = dateKey(new Date(Date.now() - 86400000));
  if (dates[0] !== today && dates[0] !== yesterday) return 0;
  let streak = 1;
  for (let i = 1; i < dates.length; i++) {
    if (Math.round((new Date(dates[i-1]) - new Date(dates[i])) / 86400000) === 1) streak++;
    else break;
  }
  return streak;
}

function updateStats() {
  const sessions = getSessions();
  const now      = new Date();

  const today = sumSessions(sessions, new Date(dateKey(now)));

  const dow       = (now.getDay() + 6) % 7;  // Mon = 0
  const weekStart = new Date(now); weekStart.setDate(now.getDate() - dow); weekStart.setHours(0,0,0,0);
  const week = sumSessions(sessions, weekStart);

  const monthStart = new Date(now.getFullYear(), now.getMonth(), 1);
  const month = sumSessions(sessions, monthStart);

  const streak = calcStreak();

  document.getElementById('statDay').textContent    = formatTime(today.duration);
  document.getElementById('statWeek').textContent   = formatTime(week.duration);
  document.getElementById('statMonth').textContent  = formatTime(month.duration);
  document.getElementById('statStreak').textContent = streak > 0 ? streak + 'd' : '—';
  updateGoalBar();
}

const GOAL_KEY = 'fg_weekly_goal';

function getWeeklyGoal() { return parseInt(localStorage.getItem(GOAL_KEY) || '100', 10); }

function setWeeklyGoal(n) {
  localStorage.setItem(GOAL_KEY, Math.max(25, n));
  updateGoalBar();
}

function adjustGoal(delta) { setWeeklyGoal(getWeeklyGoal() + delta); }

function updateGoalBar() {
  const goal = getWeeklyGoal();
  const now  = new Date();
  const dow  = (now.getDay() + 6) % 7;
  const ws   = new Date(now); ws.setDate(now.getDate() - dow); ws.setHours(0,0,0,0);
  const reps = sumSessions(getSessions(), ws).shots;
  const pct  = Math.min(100, Math.round(reps / goal * 100));
  const done = reps >= goal;

  document.getElementById('goalTarget').textContent      = goal;
  document.getElementById('goalBarFill').style.width     = pct + '%';
  document.getElementById('goalBarFill').className       = 'goal-bar-fill' + (done ? ' done' : '');
  document.getElementById('goalReps').textContent        = reps + ' / ' + goal + ' reps';
  document.getElementById('goalPct').textContent         = pct + '%';
  document.getElementById('goalPct').className           = 'goal-pct' + (done ? ' done' : '');
}

updateStats();
updateGoalBar();

// ═══════════════════════════════════════════════════════════
// ERROR ANALYTICS
// ═══════════════════════════════════════════════════════════
const ERROR_TYPES = ['Rushed','Lifted','Dropped','Peeked','Drifted','Short','Tension','Early'];

function aggregateErrors(sessions) {
  const totals = {};
  ERROR_TYPES.forEach(e => totals[e] = 0);
  let totalShots = 0;
  for (const s of sessions) {
    if (s.errors) ERROR_TYPES.forEach(e => { totals[e] += s.errors[e] || 0; });
    totalShots += s.shots || 0;
  }
  const totalErrors = ERROR_TYPES.reduce((a, e) => a + totals[e], 0);
  return { totals, totalErrors, totalShots };
}

function sessionsInRange(fromStr, toStr) {
  return getSessions().filter(s => s.date >= fromStr && (!toStr || s.date < toStr));
}

function weekStart(d) {
  const dow = (d.getDay() + 6) % 7;
  const s = new Date(d); s.setDate(d.getDate() - dow); s.setHours(0,0,0,0); return s;
}

function buildAnalyticsHTML(period) {
  const now = new Date();
  let curFrom, curTo, prevFrom, prevTo, periodLabel;

  if (period === 'week') {
    const ws = weekStart(now);
    const lw = new Date(ws); lw.setDate(ws.getDate() - 7);
    curFrom = dateKey(ws);  curTo = null;
    prevFrom = dateKey(lw); prevTo = curFrom;
    periodLabel = 'last week';
  } else if (period === 'month') {
    const ms = new Date(now.getFullYear(), now.getMonth(), 1);
    const lm = new Date(now.getFullYear(), now.getMonth() - 1, 1);
    const lme = new Date(now.getFullYear(), now.getMonth(), 1);
    curFrom = dateKey(ms);  curTo = null;
    prevFrom = dateKey(lm); prevTo = dateKey(lme);
    periodLabel = 'last month';
  } else {
    curFrom = '2000-01-01'; curTo = null;
    prevFrom = null; prevTo = null;
    periodLabel = null;
  }

  const cur = aggregateErrors(sessionsInRange(curFrom, curTo));
  const prv = prevFrom ? aggregateErrors(sessionsInRange(prevFrom, prevTo)) : null;

  if (cur.totalErrors === 0) {
    return `<div class="no-data">No errors logged yet.<br><br>Start a session, run reps, and tap error buttons after each shot.<br>Your breakdown patterns will appear here.</div>`;
  }

  // Sort errors by count, drop zeros
  const sorted = ERROR_TYPES.filter(e => cur.totals[e] > 0)
                             .sort((a, b) => cur.totals[b] - cur.totals[a]);

  const top    = sorted[0];
  const topPct = Math.round(cur.totals[top] / cur.totalErrors * 100);

  // Trend for top fault
  let trendHTML = '';
  if (prv && prv.totalErrors > 0) {
    const prevPct = Math.round(prv.totals[top] / prv.totalErrors * 100);
    const diff = topPct - prevPct;
    if      (diff >  3) trendHTML = `<span class="trend worse">↑ +${diff}% vs ${periodLabel}</span>`;
    else if (diff < -3) trendHTML = `<span class="trend better">↓ ${Math.abs(diff)}% vs ${periodLabel}</span>`;
    else                trendHTML = `<span class="trend neutral">→ stable vs ${periodLabel}</span>`;
  }

  // Error rate per 10 shots
  const rate = cur.totalShots > 0 ? (cur.totalErrors / cur.totalShots * 10).toFixed(1) : null;
  let rateCompare = '';
  if (prv && prv.totalShots > 0 && rate !== null) {
    const prevRate = (prv.totalErrors / prv.totalShots * 10).toFixed(1);
    const delta = parseFloat(rate) - parseFloat(prevRate);
    const cls = delta > 0.1 ? 'worse' : delta < -0.1 ? 'better' : 'neutral';
    rateCompare = `<span class="trend ${cls}">${delta > 0 ? '+' : ''}${delta.toFixed(1)} vs ${periodLabel}</span>`;
  }

  // Bar rows
  const bars = sorted.map(e => {
    const pct = Math.round(cur.totals[e] / cur.totalErrors * 100);
    return `<div class="error-bar-row">
      <span class="error-bar-label">${e.toUpperCase()}</span>
      <div class="error-bar-track"><div class="error-bar-fill" style="width:${pct}%"></div></div>
      <span class="error-bar-pct">${pct}%</span>
      <span class="error-bar-cnt">×${cur.totals[e]}</span>
    </div>`;
  }).join('');

  // ── Outcome section ──────────────────────────────────────
  const periodShots  = shotsInRange(curFrom, curTo);
  const withOutcome  = periodShots.filter(s => s.outcome);
  let outcomeHTML = '';

  if (withOutcome.length > 0) {
    const made   = withOutcome.filter(s => s.outcome === 'made').length;
    const missed = withOutcome.filter(s => s.outcome === 'missed').length;
    const pos    = withOutcome.filter(s => s.outcome === 'pos').length;
    const tot    = withOutcome.length;

    const outcomeBars = [
      { label:'MADE',    cls:'out-made',   n:made   },
      { label:'MISSED',  cls:'out-missed', n:missed },
      { label:'POS ERR', cls:'out-pos',    n:pos    },
    ].filter(o => o.n > 0).map(o => {
      const pct = Math.round(o.n / tot * 100);
      return `<div class="error-bar-row">
        <span class="error-bar-label">${o.label}</span>
        <div class="error-bar-track"><div class="error-bar-fill ${o.cls}" style="width:${pct}%"></div></div>
        <span class="error-bar-pct">${pct}%</span>
        <span class="error-bar-cnt">×${o.n}</span>
      </div>`;
    }).join('');

    // Process vs Result
    const hasErrors   = s => s.errors && Object.values(s.errors).some(v => v > 0);
    const clean       = withOutcome.filter(s => !hasErrors(s));
    const flawed      = withOutcome.filter(s =>  hasErrors(s));
    const makeRate    = arr => arr.length ? Math.round(arr.filter(s => s.outcome === 'made').length / arr.length * 100) : null;
    const cleanRate   = makeRate(clean);
    const flawedRate  = makeRate(flawed);
    const rateClass   = r => r >= 80 ? 'good' : r >= 55 ? 'mid' : 'bad';

    let pvrRows = '';
    if (clean.length > 0)  pvrRows += `<div class="pvr-row"><span class="pvr-desc">Clean reps (no errors)</span><span class="pvr-rate ${rateClass(cleanRate)}">${cleanRate}%</span><span class="pvr-n">×${clean.length}</span></div>`;
    if (flawed.length > 0) pvrRows += `<div class="pvr-row"><span class="pvr-desc">Error-flagged reps</span><span class="pvr-rate ${rateClass(flawedRate)}">${flawedRate}%</span><span class="pvr-n">×${flawed.length}</span></div>`;

    // Diagnostic insight
    let insight = '';
    if (cleanRate !== null && flawedRate !== null) {
      const gap = cleanRate - flawedRate;
      if (gap < 10 && cleanRate < 70)
        insight = `<div class="pvr-insight">Make rate is low even on clean reps — likely an aim or speed issue, not mechanics.</div>`;
      else if (gap >= 20)
        insight = `<div class="pvr-insight">Strong correlation between errors and misses — fixing your #1 fault should directly improve your make rate.</div>`;
      else if (flawedRate > cleanRate)
        insight = `<div class="pvr-insight">You're making shots despite errors. Watch for compensations that will break under pressure.</div>`;
    }

    outcomeHTML = `
      <div class="section-divider"></div>
      <div class="section-title">OUTCOMES</div>
      <div class="error-bars">${outcomeBars}</div>
      <div class="error-totals">${tot} of ${periodShots.length} shots have outcome data</div>
      ${pvrRows ? `<div class="pvr-section"><div class="pvr-header">PROCESS vs RESULT</div>${pvrRows}${insight}</div>` : ''}`;
  }

  // ── Completion rate section ──────────────────────────────
  const periodSessions = sessionsInRange(curFrom, curTo);
  const totalAborts    = periodSessions.reduce((a, s) => a + (s.aborts || 0), 0);
  const totalCompleted = cur.totalShots;
  const totalAttempts  = totalCompleted + totalAborts;
  let completionHTML = '';
  if (totalAttempts > 0) {
    const compPct = Math.round(totalCompleted / totalAttempts * 100);
    const compCls = compPct >= 85 ? 'good' : compPct >= 65 ? 'mid' : 'bad';
    completionHTML = `
      <div class="section-divider"></div>
      <div class="section-title">COMPLETION RATE</div>
      <div class="pvr-section">
        <div class="pvr-row">
          <span class="pvr-desc">Completed reps</span>
          <span class="pvr-rate ${compCls}">${compPct}%</span>
          <span class="pvr-n">×${totalCompleted}</span>
        </div>
        <div class="pvr-row">
          <span class="pvr-desc">Aborted reps</span>
          <span class="pvr-rate"></span>
          <span class="pvr-n">×${totalAborts}</span>
        </div>
        ${compPct < 65 ? `<div class="pvr-insight">High abort rate — focus on committing to the full sequence before tapping PLAY.</div>` :
          compPct >= 90 ? `<div class="pvr-insight">Excellent discipline. Full-routine reps are building the deepest grooves.</div>` : ''}
      </div>`;
  }

  // ── Focus Score ──────────────────────────────────────────
  let focusHTML = '';
  if (periodSessions.length > 0) {
    const focusSessions = periodSessions.filter(s =>
      !s.errors || ((!s.errors['Rushed'] || s.errors['Rushed'] === 0) && (!s.errors['Dropped'] || s.errors['Dropped'] === 0))
    ).length;
    const focusPct = Math.round(focusSessions / periodSessions.length * 100);
    const focusCls = focusPct >= 80 ? 'good' : focusPct >= 50 ? 'mid' : 'bad';
    focusHTML = `
      <div class="section-divider"></div>
      <div class="section-title">FOCUS SCORE</div>
      <div class="pvr-section">
        <div class="pvr-row">
          <span class="pvr-desc">Sessions without Rushed or Dropped</span>
          <span class="pvr-rate ${focusCls}">${focusPct}%</span>
          <span class="pvr-n">${focusSessions}/${periodSessions.length}</span>
        </div>
        ${focusPct === 100 ? `<div class="pvr-insight">Perfect focus discipline. Every session was mechanically clean.</div>` :
          focusPct < 50 ? `<div class="pvr-insight">Rushed strokes or dropped elbows in most sessions. Slow the process — commit to the sequence before the shot.</div>` : ''}
      </div>`;
  }

  return `
    <div class="fault-callout">
      <div class="fault-label">#1 FAULT</div>
      <div class="fault-name">${top.toUpperCase()}</div>
      <div class="fault-sub">${topPct}% of all errors this ${period} ${trendHTML}</div>
    </div>
    ${rate !== null ? `
    <div class="rate-row">
      <span class="rate-big">${rate}</span>
      <span class="rate-lbl">errors per 10 shots ${rateCompare}</span>
    </div>` : ''}
    <div class="error-bars">${bars}</div>
    <div class="error-totals">${cur.totalErrors} errors · ${cur.totalShots} shots · ${periodSessions.length} sessions</div>
    ${outcomeHTML}
    ${completionHTML}
    ${focusHTML}`;
}

function getDrillStreak(drillId) {
  const hist = getDrillSessions().filter(s => s.drillId === drillId).sort((a,b) => a.id - b.id);

  for (let i = hist.length - 1; i >= 0; i--) { if (hist[i].passed) n++; else break; }

}

function drillPass() {
  const d = activeDrill;
  if (d.type === 'streak') {
    ds.streak++;
    setEl('dcMain', ds.streak);
    if (ds.streak >= d.target) finishDrillSession(true);
  } else if (d.type === 'bilateral') {
    if (ds.side === 'left') {
      ds.leftMade++;
      setEl('dcLeft', ds.leftMade);
      if (ds.leftMade >= d.target) {
        ds.side = 'right';
        const lb = document.getElementById('leftBlock');
        const rb = document.getElementById('rightBlock');
        if (lb) lb.className = 'drill-side-block done-side';
        if (rb) rb.className = 'drill-side-block active-side';
      }
    } else {
      ds.rightMade++;
      setEl('dcRight', ds.rightMade);
      if (ds.rightMade >= d.target) finishDrillSession(true);
    }
  } else if (d.type === 'clear') {
    ds.ballInClear++;
    if (ds.ballInClear >= d.clearSize) {
      ds.clearStreak++;
      ds.ballInClear = 0;
      setEl('dcMain', ds.clearStreak);
      setEl('dcBall', 1);
      if (ds.clearStreak >= d.target) finishDrillSession(true);
    } else {
      setEl('dcBall', ds.ballInClear + 1);
    }
  }
}

function drillLPass(zone) {
  if (zone === 'inner') ds.innerZone++; else ds.outerZone++;
  setEl('drInner', ds.innerZone); setEl('drOuter', ds.outerZone);
  if (zone === 'outer') { drillFail(); return; }  // outer zone = failed position = rack reset
  ds.ballInRack++;
  setEl('drBall', ds.ballInRack + 1);
  if (ds.ballInRack >= activeDrill.rackSize) {
    ds.rackStreak++;
    ds.ballInRack = 0;
    setEl('drRacks', ds.rackStreak);
    setEl('drBall', 1);
    if (ds.rackStreak >= activeDrill.target) finishDrillSession(true);
  }
}

function drillFail() {
  const d = activeDrill;
  if (d.type === 'streak') {
    ds.streak = 0;
    setEl('dcMain', 0);
    triggerAudit(d.audit, d.auditSub);
  } else if (d.type === 'rack') {
    ds.rackStreak = 0;
    ds.ballInRack = 0;
    setEl('drRacks', 0);
    setEl('drBall', 1);
  } else if (d.type === 'bilateral') {
    if (ds.side === 'left') { ds.leftMisses++; ds.leftMade = 0; setEl('dcLeft', 0); }
    else                    { ds.rightMisses++; ds.rightMade = 0; setEl('dcRight', 0); }
    if (Math.max(ds.leftMisses, ds.rightMisses) >= d.biasThreshold) {
      const biasedSide = ds.leftMisses >= ds.rightMisses ? 'LEFT' : 'RIGHT';
      ds.leftMisses = 0; ds.rightMisses = 0; // reset after flagging
      triggerAudit(d.biasAudit, `${biasedSide} side has reached the miss threshold. ${d.biasAuditSub}`);
    }
  } else if (d.type === 'clear') {
    ds.clearStreak = 0;
    ds.ballInClear = 0;
    setEl('dcMain', 0);
    setEl('dcBall', 1);
  }
}

function drillStatue() { drillFail(); }  // Long Straight self-flag

function quitDrill() {
  drillRunning = false; activeDrill = null; ds = {};
  renderDrillList();
}

function setEl(id, val) { const el = document.getElementById(id); if (el) el.textContent = val; }

// ── Finish drill session ───────────────────────────────────
function finishDrillSession(passed) {
  const d = activeDrill;
  saveDrillSession({ id: Date.now(), date: dateKey(new Date()), drillId: d.id, passed });
  const newStreak = getDrillStreak(d.id);
  const mastered  = newStreak >= 3;
  drillRunning = false;

  let body;
  if (passed) {
    body = `
      <div class="drill-result">
        <div class="drill-result-icon">${mastered ? '★' : '✓'}</div>
        <div class="drill-result-title pass">${mastered ? 'MASTERED' : 'SESSION PASSED'}</div>
        <div class="drill-result-sub">${mastered
          ? `Three consecutive sessions cleared.\n${d.name} is yours.`
          : `${newStreak} of 3 sessions completed.`}</div>
        <div class="drill-result-streak">${newStreak}</div>
        <div class="drill-result-streak-lbl">/ 3 SESSION STREAK</div>
        <button class="drill-result-btn" onclick="quitDrill()">BACK TO DRILLS</button>
      </div>`;
  } else {
    body = `
      <div class="drill-result">
        <div class="drill-result-icon">↺</div>
        <div class="drill-result-title fail">SESSION FAILED</div>
        <div class="drill-result-sub">Session streak reset to 0.\nReview your process before the next attempt.</div>
        <button class="drill-result-btn" onclick="quitDrill()">BACK TO DRILLS</button>
      </div>`;
  }
  document.getElementById('drillsContent').innerHTML = body;
}

// ── Mechanical Audit modal ─────────────────────────────────
function triggerAudit(cue, sub) {
  document.getElementById('auditCue').textContent = cue || '';
  document.getElementById('auditSub').textContent = sub || '';
  document.getElementById('auditModal').classList.add('show');
}
function dismissAudit() {
  document.getElementById('auditModal').classList.remove('show');
}

// ═══════════════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════════════
let audioCtx  = null;
let running   = false;
let runId     = 0;
let shotCount = 0;

// ═══════════════════════════════════════════════════════════
// WAKE LOCK
// ═══════════════════════════════════════════════════════════
let wakeLock = null;
async function requestWakeLock() {
  if ('wakeLock' in navigator) { try { wakeLock = await navigator.wakeLock.request('screen'); } catch {} }
}
function releaseWakeLock() {
  if (wakeLock) { wakeLock.release().catch(() => {}); wakeLock = null; }
}
document.addEventListener('visibilitychange', () => {
  if (running && document.visibilityState === 'visible') requestWakeLock();
});

// ═══════════════════════════════════════════════════════════
// AUDIO
// ═══════════════════════════════════════════════════════════
function initAudio() {
  if (!audioCtx || audioCtx.state === 'closed') audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === 'suspended') audioCtx.resume();
}

function playClick(type, when) {
  if (!audioCtx) return;
  const map = {
    hi:    [[1200, 1.0,  0.06]],
    mid:   [[800,  0.85, 0.055]],
    soft:  [[500,  0.70, 0.05]],
    slow:  [[560,  0.80, 0.08]],
    pause: [[380,  0.75, 0.12]],
    shoot: [[120,  1.0,  0.12], [1400, 0.95, 0.07]],
  };
  (map[type] || []).forEach(([freq, amp, dur]) => {
    const osc = audioCtx.createOscillator(), env = audioCtx.createGain();
    osc.connect(env); env.connect(audioCtx.destination);
    osc.frequency.value = freq;
    env.gain.setValueAtTime(0, when);
    env.gain.linearRampToValueAtTime(amp, when + 0.008);
    env.gain.exponentialRampToValueAtTime(0.001, when + dur);
    osc.start(when); osc.stop(when + dur + 0.02);
  });
}

function playCrystalBowl() {
  if (!audioCtx) return;
  const now = audioCtx.currentTime + 0.05;
  [[432, 0.35, 0.12, 3.5], [864, 0.12, 0.06, 2.0], [216, 0.10, 0.08, 2.5]].forEach(([freq, amp, atk, rel]) => {
    const o = audioCtx.createOscillator(), g = audioCtx.createGain();
    o.connect(g); g.connect(audioCtx.destination);
    o.type = 'sine'; o.frequency.value = freq;
    g.gain.setValueAtTime(0, now);
    g.gain.linearRampToValueAtTime(amp, now + atk);
    g.gain.exponentialRampToValueAtTime(0.001, now + rel);
    o.start(now); o.stop(now + rel + 0.1);
  });
}

// ═══════════════════════════════════════════════════════════
// SPEECH
// ═══════════════════════════════════════════════════════════
function getBestVoice() {
  const vs = window.speechSynthesis.getVoices();
  if (!vs.length) return null;
  return vs.find(v => v.name === 'Daniel') || vs.find(v => v.name === 'Alex')
      || vs.find(v => v.name === 'Samantha') || vs.find(v => v.name.includes('Google US English'))
      || vs.find(v => v.lang === 'en-US') || vs.find(v => v.lang && v.lang.startsWith('en')) || vs[0];
}

let speechActive = false;

function makeSpeechUtterance(text, rate = 0.84) {
  const u = new SpeechSynthesisUtterance(text);
  u.rate = rate; u.pitch = 0.95; u.volume = 1.0;
  const v = getBestVoice(); if (v) u.voice = v;
  return u;
}

function speakNext(plan, idx, startMs, myRunId) {
  if (idx >= plan.length) { speechActive = false; return; }
  if (runId !== myRunId)  { speechActive = false; return; }
  const item = plan[idx];
  setTimeout(() => {
    if (runId !== myRunId) { speechActive = false; return; }
    const u = makeSpeechUtterance(item.text, item.rate || 0.84);
    u.onend  = () => speakNext(plan, idx + 1, startMs, myRunId);
    u.onerror = () => speakNext(plan, idx + 1, startMs, myRunId);
    window.speechSynthesis.speak(u);
  }, Math.max(0, startMs + item.delayMs - performance.now()));
}

function unlockAndSpeak(plan, myRunId) {
  const silent = new SpeechSynthesisUtterance(' ');
  silent.volume = 0; silent.rate = 2;
  const v = getBestVoice(); if (v) silent.voice = v;
  const startMs = performance.now();
  silent.onend  = () => speakNext(plan, 0, startMs, myRunId);
  silent.onerror = () => speakNext(plan, 0, startMs, myRunId);
  window.speechSynthesis.cancel();
  window.speechSynthesis.speak(silent);
  speechActive = true;
}

// ═══════════════════════════════════════════════════════════
// UI
// ═══════════════════════════════════════════════════════════
const NUM_BEATS = 10;

function renderStep(s, idx, total) {
  document.getElementById('phaseLabel').textContent  = s.phase + ' · ' + s.label;
  document.getElementById('phaseCue').textContent    = s.cue;
  document.getElementById('phaseCue').className      = 'phase-cue ' + (s.color || '');
  document.getElementById('phaseDetail').textContent = s.detail;
  for (let i = 0; i < NUM_BEATS; i++)
    document.getElementById('d' + i).className = 'beat-dot' + (i === idx ? ' on-' + (s.color || '') : '');
  document.getElementById('progressFill').style.width = Math.round((idx + 1) / total * 100) + '%';
}

function renderReady() {
  document.getElementById('phaseLabel').textContent  = 'READY';
  document.getElementById('phaseCue').textContent    = 'Hit play before your shot';
  document.getElementById('phaseCue').className      = 'phase-cue';
  document.getElementById('phaseDetail').textContent = '';
  document.getElementById('progressFill').style.width = '0%';
  for (let i = 0; i < NUM_BEATS; i++) document.getElementById('d' + i).className = 'beat-dot';
  document.getElementById('errorPanel').style.display = 'none';
}

function renderComplete() {
  document.getElementById('phaseLabel').textContent  = 'COMPLETE';
  document.getElementById('phaseCue').textContent    = 'READ';
  document.getElementById('phaseCue').className      = 'phase-cue cyan';
  document.getElementById('phaseDetail').textContent = 'hold the finish · evaluate tip position';
  document.getElementById('progressFill').style.width = '100%';
  const fl = document.getElementById('doneFlash');
  fl.classList.add('show'); setTimeout(() => fl.classList.remove('show'), 350);
  document.getElementById('errorPanel').style.display = 'block';
  document.querySelectorAll('.outcome-btn').forEach(b => b.classList.remove('selected'));
}

function setButtons(playing) {
  const btn = document.getElementById('playBtn');
  btn.classList.toggle('playing', playing);
  btn.setAttribute('aria-label', playing ? 'Stop' : 'Play');
  document.getElementById('btnLabel').textContent   = playing ? 'STOP' : 'PLAY';
  document.getElementById('idleHint').style.display = playing ? 'none' : 'block';
}

// ═══════════════════════════════════════════════════════════
// ENGINE
// ═══════════════════════════════════════════════════════════
function runStep(seq, idx, myRunId) {
  if (!running || runId !== myRunId) return;
  const s = seq[idx];
  renderStep(s, idx, seq.length);
  if (s.click && audioCtx) playClick(s.click, audioCtx.currentTime + 0.015);
  const nextIdx = idx + 1;
  if (nextIdx < seq.length) {
    setTimeout(() => runStep(seq, nextIdx, myRunId), s.ms);
  } else {
    setTimeout(() => { if (!running || runId !== myRunId) return; finish(); }, s.ms);
  }
}

function start() {
  initAudio();
  requestWakeLock();
  window.speechSynthesis.cancel();
  speechActive = false;
  shotErrors  = {};    // fresh error slate for this rep
  pendingShot = null;
  running = true;
  runId++;
  const myRunId = runId;
  const seq     = buildSequence();

  setButtons(true);

  const COUNTDOWN_MS = 3000;
  const plan = [];
  let t = COUNTDOWN_MS + 100;
  for (const s of seq) {
    if (s.speak) plan.push({ text: s.speak, delayMs: t, rate: s.speakRate || 0.84 });
    t += s.ms;
  }
  plan.push({ text: 'Read', delayMs: t + 800, rate: 0.72 });

  unlockAndSpeak(plan, myRunId);

  let countdown = 3;
  const cdEl    = document.getElementById('phaseCue');
  document.getElementById('phaseLabel').textContent = 'GET READY';
  cdEl.textContent = countdown; cdEl.className = 'phase-cue gold';
  if (audioCtx) playClick('soft', audioCtx.currentTime + 0.05);

  const cdInterval = setInterval(() => {
    if (!running || runId !== myRunId) { clearInterval(cdInterval); return; }
    countdown--;
    if (countdown > 0) {
      cdEl.textContent = countdown;
      if (audioCtx) playClick('soft', audioCtx.currentTime + 0.05);
    } else {
      clearInterval(cdInterval);
      cdEl.textContent = '';
      runStep(seq, 0, myRunId);
    }
  }, 1000);
}

function finish() {
  running = false;
  releaseWakeLock();
  // Create pending shot record — awaits outcome tap
  pendingShot = { id: Date.now(), date: dateKey(new Date()), sessionStart: sessionStartTs, errors: { ...shotErrors } };
  shotCount++;
  document.getElementById('shotCountNum').textContent = shotCount;
  setButtons(false);
  playCrystalBowl();
  renderComplete();
  if (sessionActive) updateStats();
  updateGoalBar();
}

function stop() {
  if (running) sessionAbortCount++;  // mid-rep abort
  running = false;
  runId++;
  releaseWakeLock();
  speechActive = false;
  pendingShot = null;
  window.speechSynthesis.cancel();
  setButtons(false);
  renderReady();
}

function togglePlay() { if (running) stop(); else start(); }

// ═══════════════════════════════════════════════════════════
// VOICE PRELOAD
// ═══════════════════════════════════════════════════════════
window.speechSynthesis.getVoices();
window.speechSynthesis.onvoiceschanged = () => window.speechSynthesis.getVoices();
document.getElementById('playBtn').addEventListener('click', () => {
  if (window.speechSynthesis.paused) window.speechSynthesis.resume();
});

// ═══════════════════════════════════════════════════════════
// KEYBOARD — space / enter
// ═══════════════════════════════════════════════════════════
document.addEventListener('keydown', e => {
  if ((e.code === 'Space' || e.code === 'Enter') && !e.repeat) { e.preventDefault(); togglePlay(); }
});

// ═══════════════════════════════════════════════════════════
// SERVICE WORKER
// ═══════════════════════════════════════════════════════════
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => navigator.serviceWorker.register('./sw.js'));
}
</script>
